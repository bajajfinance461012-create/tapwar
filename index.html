    const armSwing=(state==='walk')?Math.sin(t*2)*12:0;
    if(state==='block'){
      ctx.fillStyle=col.arm;
      ctx.save();ctx.translate(0,sy);ctx.rotate(-.7);ctx.fillRect(-5,-4,11,22);
      ctx.fillStyle=col.glove;ctx.beginPath();ctx.ellipse(0,19,8,7,0,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.save();ctx.translate(0,sy);ctx.rotate(.25);ctx.fillStyle=col.arm;ctx.fillRect(-6,-4,11,19);
      ctx.fillStyle=col.glove;ctx.beginPath();ctx.ellipse(0,16,8,7,0,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.fillStyle='rgba(0,200,255,.1)';ctx.beginPath();ctx.ellipse(0,sy+8,20,18,0,0,Math.PI*2);ctx.fill();
    } else if(state==='special'){
      const sp=stT/35;
      ctx.fillStyle=col.arm;
      ctx.save();ctx.translate(-17,sy+5);ctx.rotate(-.7+sp*.3);ctx.fillRect(-5,-4,11,22);
      ctx.fillStyle=col.specialCol||'#ff6600';ctx.beginPath();ctx.arc(0,19,12,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.save();ctx.translate(17,sy+5);ctx.rotate(.7-sp*.3);ctx.fillStyle=col.arm;ctx.fillRect(-6,-4,11,22);
      ctx.fillStyle=col.specialCol||'#ff6600';ctx.beginPath();ctx.arc(0,19,12,0,Math.PI*2);ctx.fill();ctx.restore();
    } else {
      const pe=(state==='punch'&&stT>0)?Math.min(1,(22-stT)/8):0;
      ctx.fillStyle=col.armDark||col.arm;
      ctx.save();ctx.translate(-14,sy);ctx.rotate(armSwing*.01);ctx.fillRect(-5,0,10,22);
      ctx.fillStyle=col.glove;ctx.beginPath();ctx.ellipse(0,23,7,6,0,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.fillStyle=col.arm;
      ctx.save();ctx.translate(14+pe*26,sy-pe*3);ctx.rotate(-armSwing*.01);ctx.fillRect(-5,0,11,22);
      ctx.fillStyle=col.glove;
      if(pe>.5){
        ctx.beginPath();ctx.ellipse(0,23,12,9,0,0,Math.PI*2);ctx.fill();
        if(pe>.8){ctx.strokeStyle='rgba(255,200,0,.7)';ctx.lineWidth=2;for(let li=0;li<5;li++){const la=li*(Math.PI*2/5);ctx.beginPath();ctx.moveTo(Math.cos(la)*7,23+Math.sin(la)*7);ctx.lineTo(Math.cos(la)*14,23+Math.sin(la)*14);ctx.stroke();}}
      } else {ctx.beginPath();ctx.ellipse(0,23,7,6,0,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    }
    // Head
    const hy=-58+by;
    ctx.fillStyle=col.skin;ctx.fillRect(-7,ty2-5,14,9);
    ctx.fillStyle=col.skin;ctx.beginPath();ctx.ellipse(0,hy,15,17,0,0,Math.PI*2);ctx.fill();
    // Hair based on character
    ctx.fillStyle=col.hair;
    if(isP){
      for(let si=0;si<6;si++){const sa=(si-2.5)*.3;ctx.beginPath();ctx.moveTo(Math.sin(sa-.15)*12,hy+Math.cos(sa-.15)*12);ctx.lineTo(Math.sin(sa)*(16+Math.abs(sa)*4),hy+Math.cos(sa)*(16+Math.abs(sa)*4));ctx.lineTo(Math.sin(sa+.15)*12,hy+Math.cos(sa+.15)*12);ctx.closePath();ctx.fill();}
      ctx.fillStyle=col.headband;ctx.fillRect(-16,hy-5,32,7);
      ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(-14,hy-4,28,3);
    } else {
      ctx.beginPath();ctx.ellipse(0,hy-8,15,10,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(-3,hy+2);ctx.lineTo(0,hy-24);ctx.lineTo(3,hy+2);ctx.closePath();ctx.fill();
      if(col.hairAccent){ctx.fillStyle=col.hairAccent;ctx.beginPath();ctx.moveTo(-2,hy);ctx.lineTo(0,hy-22);ctx.lineTo(2,hy);ctx.closePath();ctx.fill();}
    }
    // Eyes
    if(state==='hurt'&&stT>8){
      ctx.strokeStyle='#000';ctx.lineWidth=2;
      [[-6,hy+1],[6,hy+1]].forEach(function(e2){ctx.beginPath();ctx.moveTo(e2[0]-3,e2[1]-3);ctx.lineTo(e2[0]+3,e2[1]+3);ctx.stroke();ctx.beginPath();ctx.moveTo(e2[0]+3,e2[1]-3);ctx.lineTo(e2[0]-3,e2[1]+3);ctx.stroke();});
    } else {
      ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(-6,hy+1,5,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(6,hy+1,5,4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=col.eyeCol;ctx.beginPath();ctx.arc(-5+(dir===1?1:-1),hy+1,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7+(dir===1?1:-1),hy+1,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-5+(dir===1?1:-1),hy+1,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7+(dir===1?1:-1),hy+1,1.2,0,Math.PI*2);ctx.fill();
    }
    ctx.strokeStyle=col.hair;ctx.lineWidth=2.5;ctx.lineCap='round';
    if(isP){ctx.beginPath();ctx.moveTo(-11,hy-8);ctx.lineTo(-2,hy-11);ctx.stroke();ctx.beginPath();ctx.moveTo(11,hy-8);ctx.lineTo(2,hy-11);ctx.stroke();}
    else{ctx.beginPath();ctx.moveTo(-11,hy-10);ctx.lineTo(-3,hy-6);ctx.stroke();ctx.beginPath();ctx.moveTo(11,hy-10);ctx.lineTo(3,hy-6);ctx.stroke();}
    if(state==='hurt'&&stT>5){ctx.fillStyle='rgba(255,0,0,'+(stT/25*.3)+')';ctx.beginPath();ctx.ellipse(0,-15,28,52,0,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }

  // CHARACTER SELECT PREVIEW CANVAS
  function drawCharSelect(idx){
    const cv=selCR.current;if(!cv)return;
    const ctx=cv.getContext('2d');
    const W2=320,H2=200;
    ctx.clearRect(0,0,W2,H2);
    selFrame.current++;
    const fr=selFrame.current;

    // BG
    const bg=ctx.createLinearGradient(0,0,0,H2);
    bg.addColorStop(0,'#08001a');bg.addColorStop(1,'#150030');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W2,H2);

    // Floor glow
    ctx.fillStyle='rgba(120,0,255,.15)';ctx.fillRect(0,160,W2,40);
    ctx.strokeStyle='rgba(160,0,255,.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,160);ctx.lineTo(W2,160);ctx.stroke();

    // Draw 3 chars - current big in center, neighbors small on sides
    const positions=[
      {x:50, y:160, scale:.55, ai:(idx-1+6)%6},
      {x:160,y:160, scale:1.0, ai:idx},
      {x:270,y:160, scale:.55, ai:(idx+1)%6},
    ];

    positions.forEach(function(pos,pi){
      const ch=CHARS[pos.ai];
      ctx.save();
      ctx.translate(pos.x,pos.y);
      ctx.scale(pos.scale,pos.scale);
      const alpha=pi===1?1:0.4;
      ctx.globalAlpha=alpha;
      // Selected glow
      if(pi===1){
        ctx.shadowBlur=20;
        ctx.shadowColor=ch.col.eyeCol;
      }
      drawFighter(ctx,{x:0,y:0,dir:1,state:'idle',stateTimer:0,frame:fr,col:ch.col,isPlayer:true});
      ctx.shadowBlur=0;
      // Name tag
      if(pi===1){
        ctx.font='bold 14px Orbitron,sans-serif';
        ctx.textAlign='center';
        ctx.fillStyle=ch.col.eyeCol;
        ctx.fillText(ch.name,0,-80);
      }
      ctx.restore();
    });

    // VS text
    ctx.font='bold 18px Orbitron,sans-serif';
    ctx.textAlign='center';
    ctx.fillStyle='rgba(255,50,50,.6)';
    ctx.fillText('VS CPU',W2/2,185);
  }

  // Start select preview loop
  function startSelectPreview(){
    function loop(){
      if(phR.current!=='select')return;
      drawCharSelect(selIdx);
      selRaf.current=requestAnimationFrame(loop);
    }
    if(selRaf.current)cancelAnimationFrame(selRaf.current);
    selRaf.current=requestAnimationFrame(loop);
  }

  function drawBG(ctx,frame){
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#08001a');sky.addColorStop(.7,'#150030');sky.addColorStop(1,'#000');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0d0025';ctx.fillRect(0,50,W,GY-50);
    [[55,90],[W-55,90]].forEach(function(tp){
      const tx=tp[0],ty=tp[1];
      const fl=0.85+Math.sin(frame*.25)*.15;
      ctx.fillStyle='#5c3010';ctx.fillRect(tx-3,ty,6,25);
      ctx.save();ctx.globalAlpha=.25*fl;
      const fg=ctx.createRadialGradient(tx,ty,0,tx,ty,35);
      fg.addColorStop(0,'#ff8000');fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg;ctx.beginPath();ctx.arc(tx,ty,35,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.save();ctx.globalAlpha=fl;
      const fc=ctx.createLinearGradient(tx,ty-20,tx,ty);
      fc.addColorStop(0,'rgba(255,50,0,0)');fc.addColorStop(.5,'rgba(255,150,0,.9)');fc.addColorStop(1,'rgba(255,220,0,1)');
      ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(tx+Math.sin(frame*.2)*2,ty-10,5,12,0,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    for(let ci=0;ci<W;ci+=15){
      const ch=18+Math.sin(ci*.35+frame*.07)*7;
      ctx.fillStyle='rgba(20,0,40,.8)';
      ctx.beginPath();ctx.arc(ci+7,GY-ch,6,Math.PI,0);ctx.fill();ctx.fillRect(ci+2,GY-ch,10,ch);
    }
    const fl2=ctx.createLinearGradient(0,GY,0,H);
    fl2.addColorStop(0,'#180038');fl2.addColorStop(1,'#04000f');
    ctx.fillStyle=fl2;ctx.fillRect(0,GY,W,H-GY);
    ctx.strokeStyle='rgba(100,0,180,.2)';ctx.lineWidth=1;
    for(let gi=0;gi<=8;gi++){const gx=gi*(W/8);ctx.beginPath();ctx.moveTo(gx,GY);ctx.lineTo(W/2,H);ctx.stroke();}
    ctx.shadowBlur=12;ctx.shadowColor='#8800ff';
    ctx.strokeStyle='rgba(140,0,255,.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();ctx.shadowBlur=0;
  }

  function spawnFX(g,x,y,col){
    for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*5;g.fx.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20,max:20,r:2+Math.random()*3,col,type:'blob'});}
    for(let j=0;j<8;j++){const a=Math.random()*Math.PI*2,s=4+Math.random()*6;g.fx.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:15,max:15,r:1.5,col,type:'spark'});}
    g.fx.push({x,y,vx:0,vy:0,life:18,max:18,r:1,col,type:'ring'});
  }

  function initGame(pChar,eChar,round,sc){
    const ps=pChar.stats,es=eChar.stats;
    return {
      frame:0,timer:60*60,round:round||1,
      pChar,eChar,
      p:{x:85,y:GY,hp:ps.hp,mhp:ps.hp,state:'idle',dir:1,vx:0,fr:0,stT:0,sp:0,block:false,cd:0,spd:ps.spd,dmg:ps.dmg,spMult:ps.special},
      e:{x:275,y:GY,hp:es.hp,mhp:es.hp,state:'idle',dir:-1,vx:0,fr:0,stT:0,sp:0,block:false,cd:0,ai:0,spd:es.spd,dmg:es.dmg,spMult:es.special},
      fx:[],combo:0,comboT:0,hitTxt:'',hitT:0,hitCol:'#fff',score:sc||0,over:false,
    };
  }

  function aiUpdate(g){
    const e=g.e,p=g.p;
    if(e.state==='hurt'||e.state==='punch'||e.state==='kick'||e.state==='special')return;
    e.ai--;if(e.ai>0)return;
    const dist=Math.abs(e.x-p.x),r=Math.random(),aggr=0.5+(1-e.hp/e.mhp)*.45;
    if((p.state==='punch'||p.state==='kick')&&dist<90&&r<.55){e.state='block';e.stT=28;e.ai=32;return;}
    if(dist>140){e.vx=(e.x>p.x?-1:1)*e.spd;e.state='walk';e.ai=20;}
    else if(dist<42){
      if(r<.3){e.vx=(e.x>p.x?1:-1)*e.spd;e.state='walk';e.ai=14;}
      else if(r<.6+aggr*.2){e.state='punch';e.stT=22;e.vx=0;e.ai=30;}
      else{e.state='kick';e.stT=25;e.vx=0;e.ai=38;}
    } else {
      if(r<.08&&e.sp>=100){e.state='special';e.stT=35;e.vx=0;e.ai=55;e.sp=0;}
      else if(r<.3+aggr*.25){e.state='punch';e.stT=22;e.vx=0;e.ai=28;}
      else if(r<.5+aggr*.15){e.state='kick';e.stT=25;e.vx=0;e.ai=35;}
      else if(r<.65){e.vx=(e.x>p.x?-1:1)*e.spd;e.state='walk';e.ai=18;}
      else{e.state='idle';e.ai=20;e.vx=0;}
    }
  }

  function tryHit(atk,def,g,baseDmg,type){
    if(def.cd>0)return;
    const dist=Math.abs(atk.x-def.x);
    const range=type==='kick'?82:type==='special'?95:68;
    if(dist>range)return;
    const facing=(atk.dir===1&&atk.x<def.x)||(atk.dir===-1&&atk.x>def.x);
    if(!facing)return;
    const hx=(atk.x+def.x)/2,hy=def.y-50;
    const dmg=Math.round(baseDmg*atk.dmg);
    if(def.state==='block'&&def.block){
      sndBlock();spawnFX(g,hx,hy,'#00e5ff');
      def.hp-=Math.round(dmg*.1);def.cd=18;
      g.hitTxt='BLOCK';g.hitT=20;g.hitCol='#00e5ff';return;
    }
    type==='kick'?sndKick():type==='special'?sndSpecial():sndPunch();
    sndHurt();
    def.hp=Math.max(0,def.hp-dmg);def.state='hurt';def.stT=22;def.cd=25;def.vx=atk.dir*3;
    atk.sp=Math.min(100,atk.sp+18);
    g.combo++;g.comboT=65;
    const col=type==='special'?atk.spMult>1.2?'#ff6b00':'#a855f7':type==='kick'?'#ff9500':'#ff1744';
    spawnFX(g,hx,hy,col);
    g.hitTxt=type==='special'?'SPECIAL!!':type==='kick'?'KICK!':'PUNCH!';
    g.hitT=35;g.hitCol=col;
  }

  function update(){
    const g=G.current;if(!g||g.over)return;
    const p=g.p,e=g.e;
    g.frame++;p.fr++;e.fr++;g.timer--;
    if(g.comboT>0)g.comboT--;if(g.hitT>0)g.hitT--;
    if(p.cd>0)p.cd--;if(e.cd>0)e.cd--;
    [p,e].forEach(ch=>{if(ch.stT>0){ch.stT--;if(ch.stT===0&&['punch','kick','hurt','special','block'].indexOf(ch.state)>=0){ch.state='idle';ch.block=false;}}});
    const ks=keys.current;
    if(p.state!=='hurt'&&p.state!=='punch'&&p.state!=='kick'&&p.state!=='special'){
      if(ks.left){p.vx=-p.spd;if(!p.block)p.state='walk';}
      else if(ks.right){p.vx=p.spd;if(!p.block)p.state='walk';}
      else if(p.state==='walk')p.state='idle';
      if(ks.block){p.block=true;p.state='block';}
      else if(['punch','kick','special'].indexOf(p.state)<0){p.block=false;}
    }
    p.x+=p.vx;e.x+=e.vx;p.vx*=.65;e.vx*=.65;
    p.x=Math.max(32,Math.min(W-32,p.x));e.x=Math.max(32,Math.min(W-32,e.x));
    if(Math.abs(p.x-e.x)<40){const push=(p.x<e.x?-1:1)*1.5;p.x+=push;e.x-=push;}
    if(['punch','kick','special'].indexOf(p.state)<0)p.dir=e.x>p.x?1:-1;
    if(['punch','kick','special'].indexOf(e.state)<0)e.dir=p.x<e.x?-1:1;
    if(p.state==='idle')p.sp=Math.min(100,p.sp+.35*p.spMult);
    if(e.state==='idle')e.sp=Math.min(100,e.sp+.2*e.spMult);
    if(['punch','kick','special'].indexOf(p.state)>=0&&p.stT>0)tryHit(p,e,g,p.state==='punch'?12:p.state==='kick'?17:28,p.state);
    if(['punch','kick','special'].indexOf(e.state)>=0&&e.stT>0)tryHit(e,p,g,e.state==='punch'?10:e.state==='kick'?15:25,e.state);
    aiUpdate(g);
    if(p.hp<=0||e.hp<=0||g.timer<=0)endRound(g);
  }

  function endRound(g){
    g.over=true;
    const won=g.p.hp>g.e.hp||g.e.hp<=0;
    if(won){sndWin();g.score+=500+g.round*100+Math.round(g.p.hp*3);setScore(g.score);g.hitTxt='K.O.!';g.hitT=120;g.hitCol='#ffd700';g.e.state='hurt';g.e.stT=200;}
    else{sndKO();g.hitTxt='K.O.!';g.hitT=120;g.hitCol='#ff1744';g.p.state='hurt';g.p.stT=200;}
    setTimeout(()=>{
      if(won&&g.round<3){G.current=initGame(g.pChar,g.eChar,g.round+1,g.score);}
      else{phR.current='result';setPh(won?'win':'lose');}
    },2200);
  }

  function draw(){
    const cv=cR.current;if(!cv)return;
    const ctx=cv.getContext('2d');
    const g=G.current;if(!g)return;
    drawBG(ctx,g.frame);
    drawFighter(ctx,{x:g.p.x,y:g.p.y,dir:g.p.dir,state:g.p.state,stateTimer:g.p.stT,frame:g.p.fr,col:g.pChar.col,isPlayer:true});
    drawFighter(ctx,{x:g.e.x,y:g.e.y,dir:g.e.dir,state:g.e.state,stateTimer:g.e.stT,frame:g.e.fr,col:g.eChar.col,isPlayer:false});
    // FX
    g.fx=g.fx.filter(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.22;pt.vx*=.93;pt.life--;
      const a=pt.life/pt.max;ctx.save();ctx.globalAlpha=a;
      if(pt.type==='spark'){ctx.strokeStyle=pt.col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pt.x,pt.y);ctx.lineTo(pt.x-pt.vx*3,pt.y-pt.vy*3);ctx.stroke();}
      else if(pt.type==='ring'){ctx.strokeStyle=pt.col;ctx.lineWidth=2;ctx.beginPath();ctx.arc(pt.x,pt.y,30*(1-a),0,Math.PI*2);ctx.stroke();}
      else{ctx.fillStyle=pt.col;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();return pt.life>0;});
    // HUD bars
    const BW=148,BH=16;
    const pp=Math.max(0,g.p.hp/g.p.mhp);
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(6,6,BW+4,BH+4);
    ctx.fillStyle='#222';ctx.fillRect(8,8,BW,BH);
    ctx.fillStyle=pp>.5?'#00e676':pp>.25?'#ffea00':'#ff1744';ctx.fillRect(8,8,BW*pp,BH);
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(8,8,BW*pp,6);
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.strokeRect(8,8,BW,BH);
    // Player name on bar
    ctx.font='bold 8px Orbitron,sans-serif';ctx.textAlign='left';ctx.fillStyle='#fff';
    ctx.fillText(g.pChar.name,10,7);
    const ep=Math.max(0,g.e.hp/g.e.mhp);
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(W-BW-10,6,BW+4,BH+4);
    ctx.fillStyle='#222';ctx.fillRect(W-BW-8,8,BW,BH);
    ctx.fillStyle=ep>.5?'#ff1744':ep>.25?'#ffea00':'#00e676';ctx.fillRect(W-8-BW*ep,8,BW*ep,BH);
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(W-8-BW*ep,8,BW*ep,6);
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.strokeRect(W-BW-8,8,BW,BH);
    ctx.font='bold 8px Orbitron,sans-serif';ctx.textAlign='right';ctx.fillStyle='#fff';
    ctx.fillText(g.eChar.name,W-10,7);
    // Timer
    const tl=Math.ceil(g.timer/60);
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(W/2-20,4,40,24);
    ctx.font='bold 15px Orbitron,sans-serif';ctx.textAlign='center';
    ctx.fillStyle=tl<=10?'#ff1744':'#fff';ctx.fillText(tl,W/2,21);
    for(let ri=0;ri<3;ri++){ctx.fillStyle=ri<g.round-1?'#ffd700':'rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(W/2-8+ri*8,30,3,0,Math.PI*2);ctx.fill();}
    // Special bar
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(8,28,88,8);
    ctx.fillStyle=g.p.sp>=100?'#ffd700':'#7c3aed';ctx.fillRect(8,28,88*(g.p.sp/100),8);
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.strokeRect(8,28,88,8);
    ctx.font='bold 6px Orbitron,sans-serif';ctx.textAlign='left';
    ctx.fillStyle=g.p.sp>=100?'#ffd700':'#a78bfa';
    ctx.fillText(g.p.sp>=100?'SP READY!':'SPECIAL',10,28);
    // Combo
    if(g.combo>1&&g.comboT>0){const ca=Math.min(1,g.comboT/30);ctx.globalAlpha=ca;ctx.font='bold '+(16+g.combo)+'px Orbitron,sans-serif';ctx.textAlign='center';ctx.fillStyle='#ffd700';ctx.shadowBlur=12;ctx.shadowColor='#ffd700';ctx.fillText(g.combo+'x COMBO!!',W/2,H/2-15);ctx.shadowBlur=0;ctx.globalAlpha=1;}
    if(g.hitTxt&&g.hitT>0){const ha=Math.min(1,g.hitT/25);ctx.globalAlpha=ha;ctx.font='bold 22px Orbitron,sans-serif';ctx.textAlign='center';ctx.fillStyle=g.hitCol;ctx.shadowBlur=10;ctx.shadowColor=g.hitCol;ctx.fillText(g.hitTxt,W/2,H/2+25);ctx.shadowBlur=0;ctx.globalAlpha=1;}
    if(g.frame<55){const fa=Math.max(0,(55-g.frame)/30);ctx.globalAlpha=fa;ctx.font='bold 50px Orbitron,sans-serif';ctx.textAlign='center';ctx.fillStyle='#ffd700';ctx.shadowBlur=20;ctx.shadowColor='#ff6600';ctx.fillText(g.round===1?'FIGHT!':'ROUND '+g.round,W/2,H/2);ctx.shadowBlur=0;ctx.globalAlpha=1;}
  }

  function loop(){
    if(phR.current!=='running')return;
    update();draw();rafR.current=requestAnimationFrame(loop);
  }

  function act(action,down){
    const g=G.current;if(!g)return;
    const p=g.p,ks=keys.current;
    if(action==='left'){ks.left=down;return;}
    if(action==='right'){ks.right=down;return;}
    if(action==='block'){ks.block=down;return;}
    if(!down)return;
    if(p.state==='hurt')return;
    if(action==='punch'&&['punch','kick','special'].indexOf(p.state)<0){p.state='punch';p.stT=22;p.vx=p.dir*1.5;p.block=false;}
    else if(action==='kick'&&['punch','kick','special'].indexOf(p.state)<0){p.state='kick';p.stT=26;p.vx=0;p.block=false;}
    else if(action==='special'&&p.sp>=100&&['punch','kick','special'].indexOf(p.state)<0){p.state='special';p.stT=35;p.vx=0;p.block=false;p.sp=0;}
  }

  function startGame(pChar){
    // Random enemy (different from player)
    const available=CHARS.filter(c=>c.id!==pChar.id);
    const eChar=available[Math.floor(Math.random()*available.length)];
    if(selRaf.current)cancelAnimationFrame(selRaf.current);
    G.current=initGame(pChar,eChar,1,0);
    keys.current={};setScore(0);
    phR.current='running';setPh('running');
    if(rafR.current)cancelAnimationFrame(rafR.current);
    rafR.current=requestAnimationFrame(loop);
    setTimeout(()=>sndFight(),500);
  }

  useEffect(()=>()=>{if(rafR.current)cancelAnimationFrame(rafR.current);if(selRaf.current)cancelAnimationFrame(selRaf.current);},[]);

  useEffect(()=>{
    if(ph==='select'){
      phR.current='select';
      startSelectPreview();
    }
  },[ph,selIdx]);

  const BS=(col,w,h)=>{w=w||52;h=h||52;return {width:w,height:h,borderRadius:Math.min(w,h)/2,background:'radial-gradient(circle at 30% 30%,'+col+'ee,'+col+'66)',border:'2px solid '+col,color:'#fff',fontSize:'1rem',fontWeight:900,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 15px '+col+'44',userSelect:'none',WebkitUserSelect:'none',touchAction:'none',WebkitTapHighlightColor:'transparent',flexShrink:0};};

  return(
    <div style={{textAlign:'center',padding:'.3rem',width:'100%',maxWidth:420,margin:'0 auto',userSelect:'none',WebkitUserSelect:'none',background:'#050010',minHeight:'100vh'}}>
      <TopBar name={name} onBack={()=>{phR.current='idle';if(rafR.current)cancelAnimationFrame(rafR.current);if(selRaf.current)cancelAnimationFrame(selRaf.current);onBack();}} game={game}/>

      {ph==='running'&&<div>
        <canvas ref={cR} width={W} height={H} style={{display:'block',margin:'0 auto .2rem',maxWidth:'100%',borderRadius:10,boxShadow:'0 0 30px rgba(100,0,255,.4)'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 6px',gap:4,background:'rgba(0,0,0,.6)',borderRadius:10}}>
          <div style={{display:'flex',gap:4}}>
            <button style={BS('#3b82f6')} onTouchStart={e=>{e.preventDefault();act('left',true);}} onTouchEnd={e=>{e.preventDefault();act('left',false);}} onMouseDown={()=>act('left',true)} onMouseUp={()=>act('left',false)}>L</button>
            <button style={BS('#3b82f6')} onTouchStart={e=>{e.preventDefault();act('right',true);}} onTouchEnd={e=>{e.preventDefault();act('right',false);}} onMouseDown={()=>act('right',true)} onMouseUp={()=>act('right',false)}>R</button>
          </div>
          <button style={{...BS('#22c55e',60,40),borderRadius:8}} onTouchStart={e=>{e.preventDefault();act('block',true);}} onTouchEnd={e=>{e.preventDefault();act('block',false);}} onMouseDown={()=>act('block',true)} onMouseUp={()=>act('block',false)}>BLK</button>
          <div style={{display:'flex',gap:4}}>
            <button style={BS('#ef4444')} onTouchStart={e=>{e.preventDefault();act('punch',true);}} onMouseDown={()=>act('punch',true)}>P</button>
            <button style={BS('#f97316')} onTouchStart={e=>{e.preventDefault();act('kick',true);}} onMouseDown={()=>act('kick',true)}>K</button>
            <button style={BS('#a855f7',58,58)} onTouchStart={e=>{e.preventDefault();act('special',true);}} onMouseDown={()=>act('special',true)}>SP</button>
          </div>
        </div>
        <div style={{fontSize:'.6rem',color:'#444',marginTop:3}}>L/R Move | P Punch | K Kick | SP Special | BLK Block</div>
      </div>}

      {ph==='select'&&<div style={{padding:'.5rem 0'}}>
        <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'1rem',fontWeight:900,color:'#ffd700',marginBottom:'.4rem',letterSpacing:2}}>SELECT FIGHTER</div>
        <canvas ref={selCR} width={320} height={200} style={{display:'block',margin:'0 auto .5rem',borderRadius:10,border:'1px solid rgba(120,0,255,.3)'}}/>
        {/* Character info */}
        <div style={{background:'rgba(255,255,255,.04)',borderRadius:10,padding:'.5rem',margin:'0 .5rem .5rem',border:'1px solid rgba(120,0,255,.2)'}}>
          <div style={{fontFamily:'Orbitron,sans-serif',fontWeight:900,color:CHARS[selIdx].col.eyeCol,fontSize:'.95rem',marginBottom:'.3rem'}}>{CHARS[selIdx].name}</div>
          <div style={{color:'#888',fontSize:'.72rem',marginBottom:'.4rem'}}>{CHARS[selIdx].desc}</div>
          <div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap'}}>
            {[['HP',CHARS[selIdx].stats.hp,130,'#ef4444'],['SPD',Math.round(CHARS[selIdx].stats.spd/3.4*100),100,'#3b82f6'],['DMG',Math.round(CHARS[selIdx].stats.dmg/1.6*100),100,'#f97316'],['SP',Math.round(CHARS[selIdx].stats.special/1.5*100),100,'#a855f7']].map(([label,val,max,col])=>(
              <div key={label} style={{textAlign:'center',minWidth:55}}>
                <div style={{fontSize:'.6rem',color:'#666',marginBottom:2}}>{label}</div>

        {/* Arrows + select */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,marginBottom:'.5rem'}}>
          <button onClick={()=>{setSelIdx((selIdx-1+6)%6);sndSelect();}} style={{...BS('#555',44,44),fontSize:'1.2rem',flexShrink:0}}>{'<'}</button>
          <button onClick={()=>startGame(CHARS[selIdx])} style={GB(CHARS[selIdx].col.eyeCol,'#a855f7',{maxWidth:160,padding:'.5rem 1rem'})}>FIGHT!</button>

        {/* All characters mini grid */}
        <div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap',padding:'0 .5rem'}}>
          {CHARS.map((c,i)=>(

              {c.name}

        </div>
      </div>}

      {ph==='idle'&&(
        <div style={{padding:'1.5rem 0',display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div style={{fontSize:'3rem',marginBottom:'.3rem',color:'#ef4444',fontFamily:'Orbitron,sans-serif',fontWeight:900,textShadow:'0 0 20px #ef4444'}}>FIGHT</div>
          <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'1.2rem',fontWeight:900,color:'#ffd700',marginBottom:'.4rem',letterSpacing:3}}>STREET FIGHT</div>
          <div style={{color:'#666',fontSize:'.78rem',lineHeight:1.9,marginBottom:'1.2rem',textAlign:'center'}}>
            6 fighters - apna favorite chuno!<br/>
            Har character ke unique stats hain<br/>
            <span style={{color:'#ffd700'}}>3 Rounds - HP zyada ho toh jeet!</span>
          </div>
          <button onClick={()=>{phR.current='select';setPh('select');}} style={GB(game.c[0],game.c[1],{maxWidth:220,margin:'0 auto'})}>SELECT FIGHTER</button>
        </div>
      )}

      {(ph==='win'||ph==='lose')&&(
        <div style={{padding:'2rem 0',animation:'bounceIn .4s',display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div style={{fontSize:'4rem',marginBottom:'.4rem'}}>{ph==='win'?'WIN':'LOSE'}</div>
          <div style={{fontFamily:'Orbitron,sans-serif',color:ph==='win'?'#ffd700':'#ff1744',fontSize:'1.4rem',fontWeight:900,margin:'.3rem 0'}}>{ph==='win'?'VICTORY!':'DEFEATED!'}</div>
          {ph==='win'&&<div style={{color:'#ffd700',fontSize:'1.8rem',fontWeight:900}}>Score: {score}</div>}
          <div style={{display:'flex',gap:8,marginTop:'.8rem'}}>
            <button onClick={()=>{phR.current='select';setPh('select');}} style={GB(game.c[0],game.c[1],{maxWidth:160})}>REMATCH</button>
            <button onClick={()=>onEnd(score,game.id)} style={OB('#444',{maxWidth:160})}>Save</button>
          </div>
        </div>
      )}
    </div>
  );
}

function BottleFlip({game,name,onEnd,onBack}){
  const W=320, H=480;
  // Platform layout - fixed horizontal scroll
  // Each platform: {x, y, w} - y from top
  const PLAT_H=14;
  const BASE_Y=H-60;  // first platform y

  const [score,setScore]=useState(0);
  const [ph,setPh]=useState('idle');
  const cR=useRef(null);
  const rafR=useRef(null);
  const phR=useRef('idle');
  const G=useRef(null);

  const AC=()=>{try{return window.getAC();}catch(e){return null;}};
  const sndFlip=()=>{try{const c=AC();if(!c)return;const b=c.createBuffer(1,c.sampleRate*.06,c.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/d.length;d[i]=(Math.random()*2-1)*(1-t)*.5;}const s=c.createBufferSource(),g=c.createGain();g.gain.value=.4;s.buffer=b;s.connect(g);g.connect(c.destination);s.start();}catch(e){}};
  const sndLand=()=>{try{const c=AC();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(350,c.currentTime);o.frequency.exponentialRampToValueAtTime(180,c.currentTime+.1);g.gain.setValueAtTime(.35,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.13);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.15);}catch(e){}};
  const sndPerfect=()=>{try{const c=AC();if(!c)return;[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.3,c.currentTime+i*.06);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.06+.18);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.06);o.stop(c.currentTime+i*.06+.2);});}catch(e){}};
  const sndFail=()=>{try{const c=AC();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(180,c.currentTime);o.frequency.exponentialRampToValueAtTime(40,c.currentTime+.35);g.gain.setValueAtTime(.35,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.4);}catch(e){}};

  function makePlatforms(){
    const plats=[];
    // Platform 0 - starting, wide, fixed
    plats.push({x:30, y:BASE_Y, w:140});
    // Generate rest
    let px=30+140, py=BASE_Y;
    for(let i=1;i<30;i++){
      const gap=110+Math.floor(Math.random()*50);  // 110-160px gap
      px+=gap;
      // Vertical variation - gentle
      const dv=Math.floor((Math.random()-.45)*60);
      py=Math.max(H-280, Math.min(H-70, py+dv));
      const w=Math.max(55, 120-i*2);
      plats.push({x:px, y:py, w});
    }
    return plats;
  }

  function initGame(){
    const plats=makePlatforms();
    const p0=plats[0];
    return {
      plats,
      curPlat:0,
      // Bottle position - center of first platform, sitting on top
      bx: p0.x + p0.w/2,
      by: p0.y - 28,       // 28 = half bottle height
      bvx:0, bvy:0,
      bAngle:0, bSpin:0,
      onGround:true,
      charging:false,
      holdStart:0,
      score:0, combo:0,
      camX:0,
      particles:[],
      flash:0,
      flashCol:'#ffd93d',
      dead:false,
      BW:22, BH:56,  // bottle dimensions
    };
  }

  function addParticles(g,x,y,col,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*3.5;
      g.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:35,max:35,r:2+Math.random()*3,col});
    }
  }

  function drawBottle(ctx,x,y,angle,BW,BH){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    // Body
    ctx.beginPath();
    ctx.roundRect(-BW/2,-BH*.3,BW,BH*.6,5);
    const bg=ctx.createLinearGradient(-BW/2,0,BW/2,0);
    bg.addColorStop(0,'rgba(80,180,255,.75)');
    bg.addColorStop(.35,'rgba(200,240,255,.9)');
    bg.addColorStop(.65,'rgba(80,180,255,.8)');
    bg.addColorStop(1,'rgba(40,140,220,.7)');
    ctx.fillStyle=bg; ctx.fill();
    ctx.strokeStyle='rgba(80,160,240,.5)';ctx.lineWidth=1.2;ctx.stroke();
    // Water
    ctx.beginPath();ctx.roundRect(-BW/2+2,-BH*.3+2,BW-4,BH*.38,3);
    ctx.fillStyle='rgba(20,140,255,.3)';ctx.fill();
    // Neck
    ctx.beginPath();ctx.roundRect(-BW*.22,-BH*.52,BW*.44,BH*.24,3);
    ctx.fillStyle='rgba(120,210,255,.8)';ctx.fill();
    ctx.strokeStyle='rgba(80,160,240,.4)';ctx.lineWidth=1;ctx.stroke();
    // Cap
    ctx.fillStyle='#ef4444';
    ctx.beginPath();ctx.roundRect(-BW*.24,-BH*.58,BW*.48,BH*.08,2);ctx.fill();
    // Highlight
    ctx.beginPath();ctx.roundRect(-BW*.3,-BH*.28,BW*.18,BH*.35,3);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill();
    ctx.restore();
  }

  function draw(){
    const cv=cR.current;if(!cv)return;
    const ctx=cv.getContext('2d');
    const g=G.current;if(!g)return;

    // Sky BG
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#b8dff8');sky.addColorStop(1,'#e8f4fd');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

    // Floor
    ctx.fillStyle='#d4a76a';ctx.fillRect(0,H-30,W,30);
    ctx.fillStyle='#c49058';
    for(let i=0;i<W;i+=25){ctx.fillRect(i,H-30,12,30);}

    ctx.save();
    ctx.translate(-Math.round(g.camX),0);

    // Platforms
    g.plats.forEach((p,i)=>{
      const isCur=i===g.curPlat;
      const isNext=i===g.curPlat+1;
      // Shadow under platform
      ctx.fillStyle='rgba(0,0,0,.12)';
      ctx.fillRect(p.x+4,p.y+PLAT_H+2,p.w-8,6);
      // Platform top surface
      const pc=isCur?'#4ade80':isNext?'#fbbf24':'#94a3b8';
      ctx.fillStyle=pc;
      ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,PLAT_H,4);ctx.fill();
      // Shine
      ctx.fillStyle='rgba(255,255,255,.25)';
      ctx.beginPath();ctx.roundRect(p.x+4,p.y+2,p.w-8,4,2);ctx.fill();
      // Legs to floor
      ctx.fillStyle='rgba(0,0,0,.2)';
      ctx.fillRect(p.x+8,p.y+PLAT_H,6,H-30-p.y-PLAT_H);
      ctx.fillRect(p.x+p.w-14,p.y+PLAT_H,6,H-30-p.y-PLAT_H);
      // Next platform arrow indicator
      if(isNext){
        ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.roundRect(p.x-3,p.y-3,p.w+6,PLAT_H+6,6);ctx.stroke();
        ctx.setLineDash([]);
      }
    });

    // Particles
    g.particles=g.particles.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.3;p.life--;
      ctx.save();ctx.globalAlpha=p.life/p.max;
      ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      ctx.restore();
      return p.life>0;
    });

    // Land flash
    if(g.flash>0){
      ctx.save();ctx.globalAlpha=g.flash/15*.5;
      ctx.fillStyle=g.flashCol;
      ctx.beginPath();ctx.arc(g.bx,g.by+g.BH*.3,35,0,Math.PI*2);ctx.fill();
      ctx.restore();
      g.flash--;
    }

    // Bottle
    drawBottle(ctx,g.bx,g.by,g.bAngle,g.BW,g.BH);

    ctx.restore(); // end cam

    // Charge bar
    if(g.charging&&g.onGround){
      const pct=Math.min(1,(Date.now()-g.holdStart)/700);
      const bw=200,bh=10,bx=(W-bw)/2,by=H-48;
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.roundRect(bx-2,by-2,bw+4,bh+4,5);ctx.fill();
      ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
      // Color: green→yellow→red
      const r=pct<.5?Math.round(pct*2*255):255;
      const gv=pct<.5?255:Math.round((1-pct)*2*255);
      ctx.fillStyle=`rgb(${r},${gv},0)`;
      ctx.fillRect(bx,by,bw*pct,bh);
      ctx.font='bold 10px Orbitron,sans-serif';
      ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.8)';
      ctx.fillText('HOLD → RELEASE TO FLIP',W/2,by-5);
    }

    // HUD
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,34);
    ctx.font='bold 13px Orbitron,sans-serif';
    ctx.textAlign='left';ctx.fillStyle='#ffd93d';
    ctx.fillText('⭐ '+g.score,10,22);
    ctx.textAlign='center';ctx.fillStyle='#fff';
    ctx.fillText('🍾 Bottle Flip',W/2,22);
    if(g.combo>1){
      ctx.textAlign='right';ctx.fillStyle='#6bcb77';
      ctx.fillText('×'+g.combo+' COMBO!',W-8,22);
    }

    // Arrow if next platform is off-screen right
    if(g.curPlat+1<g.plats.length){
      const np=g.plats[g.curPlat+1];
      const nx=np.x-g.camX;
      if(nx>W-10){
        const pulse=.6+.4*Math.sin(Date.now()*.006);
        ctx.font=`bold ${Math.round(22*pulse)}px sans-serif`;
        ctx.textAlign='right';ctx.globalAlpha=pulse;
        ctx.fillText('→',W-6,H/2);ctx.globalAlpha=1;
      }
    }
  }

  function update(){
    const g=G.current;if(!g||g.dead)return;
    const GRAV=0.42;

    if(!g.onGround){
      g.bvy+=GRAV;
      g.by+=g.bvy;
      g.bx+=g.bvx;
      g.bAngle+=g.bSpin;
      g.bSpin*=0.99;

      // Check landing on platforms curPlat to curPlat+2
      let landed=false;
      for(let i=g.curPlat;i<=Math.min(g.curPlat+2,g.plats.length-1);i++){
        const p=g.plats[i];
        const bottleBottom=g.by+g.BH*.3;
        const bottleCX=g.bx;

        // Only detect landing when falling down (bvy>0)
        if(g.bvy>0 &&
           bottleBottom>=p.y && bottleBottom<=p.y+PLAT_H+g.bvy+2 &&
           bottleCX>p.x+4 && bottleCX<p.x+p.w-4){
          // Snap to platform top
          g.by=p.y-g.BH*.3;
          g.bvy=0; g.bvx=0;

          // Normalize angle 0..2PI
          let a=((g.bAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);

          // Good land = bottom down (near 0 or 2PI) OR top down (near PI)
          // Strict tolerance — 0.15 rad (~8deg) only
          const nearBottom = Math.min(a, Math.PI*2-a);
          const nearTop    = Math.abs(a - Math.PI);
          const goodLand   = nearBottom < 0.15 || nearTop < 0.15;
          const perfect    = nearBottom < 0.06 || nearTop < 0.06;

          if(goodLand){
            // GOOD LAND
            g.bAngle = nearBottom < nearTop ? 0 : Math.PI; // snap to upright or upside-down
            g.bSpin=0; g.onGround=true;
            const pts=perfect?50:20;
            g.combo++;
            g.score+=pts*Math.max(1,g.combo);
            setScore(g.score);
            g.flash=15; g.flashCol=perfect?'#ffd93d':'#6bcb77';
            addParticles(g,g.bx,g.by,perfect?'#ffd93d':'#6bcb77',perfect?18:8);
            perfect?sndPerfect():sndLand();
            if(i>g.curPlat) g.curPlat=i;
            landed=true;
          } else {
            // BAD LAND - side landing, fall off immediately
            g.onGround=false;
            g.bvy=3;
            g.bvx=(a<Math.PI?1:-1)*(1.5+Math.random()*2);
            g.bSpin=(a<Math.PI?1:-1)*0.1;
            g.combo=0;
          }
          break;
        }
      }

      // Fell below screen
      if(g.by>H+60){
        g.dead=true;
        phR.current='idle';
        sndFail();
        setTimeout(()=>setPh('dead'),200);
        return;
      }
    }

    // Smooth camera - keep bottle at ~30% from left
    const targetCamX=g.bx-W*.3;
    g.camX+=(targetCamX-g.camX)*.1;
    g.camX=Math.max(0,g.camX);
  }

  function loop(){
    if(phR.current!=='running')return;
    update();draw();
    rafR.current=requestAnimationFrame(loop);
  }

  function startCharge(e){
    if(e&&e.preventDefault)e.preventDefault();
    const g=G.current;if(!g||!g.onGround||g.dead)return;
    g.charging=true;
    g.holdStart=Date.now();
  }

  function doFlip(e){
    if(e&&e.preventDefault)e.preventDefault();
    const g=G.current;if(!g||!g.onGround||g.dead||!g.charging)return;
    const holdMs=Math.min(Date.now()-g.holdStart,700);
    const pct=holdMs/700; // 0..1

    g.charging=false;
    g.onGround=false;
    sndFlip();

    const GRAV=0.42;
    // Power controls height — more power = higher = more rotations possible
    // pct=0 → small hop, pct=1 → full flip
    const vy=-(9+pct*9);  // -9 to -18
    const vx=2.5+pct*2.5; // forward speed

    // Flight time in frames
    const flightT=(2*Math.abs(vy))/GRAV;

    // Target: land on BOTTOM (0 or 2PI) — so spin = N * 2PI / flightT
    // Short tap (pct<0.4): half rotation — lands on top (PI)
    // Medium tap: 1 full rotation — lands on bottom (0)
    // Long tap: 1.5 rotations — lands on top
    // We want full rotations so bottle lands on bottom
    // Pick nearest whole rotation that fits in flight time
    const maxSpin=Math.PI*2*1.5; // max 1.5 rotations
    const targetRot=Math.PI*2*(0.5+Math.round(pct*1.5)); // 1PI, 2PI, or 3PI
    const spin=targetRot/flightT;

    g.bvy=vy;
    g.bvx=vx;
    g.bSpin=spin;
  }

  function startGame(){
    G.current=initGame();
    setScore(0);
    phR.current='running';setPh('running');
    if(rafR.current)cancelAnimationFrame(rafR.current);
    rafR.current=requestAnimationFrame(loop);
  }

  useEffect(()=>()=>{if(rafR.current)cancelAnimationFrame(rafR.current);},[]);

  return(
    <div style={{textAlign:'center',padding:'.5rem',width:'100%',maxWidth:380,margin:'0 auto',userSelect:'none',WebkitUserSelect:'none'}}>
      <TopBar name={name} onBack={()=>{phR.current='idle';if(rafR.current)cancelAnimationFrame(rafR.current);onBack();}} game={game}/>

      {ph==='running'&&<canvas ref={cR} width={W} height={H}
        onMouseDown={startCharge} onMouseUp={doFlip}
        onTouchStart={startCharge} onTouchEnd={doFlip}
        style={{display:'block',margin:'0 auto',maxWidth:'100%',borderRadius:16,
          border:`2px solid ${game.c[0]}55`,cursor:'pointer',touchAction:'none',
          boxShadow:'0 8px 32px rgba(0,0,0,.4)'}}/>}

      {ph==='idle'&&(
        <div style={{padding:'1rem 0'}}>
          <div style={{fontSize:'4rem',marginBottom:'.3rem'}}>🍾</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:'1.2rem',fontWeight:900,
            background:`linear-gradient(90deg,${game.c[0]},${game.c[1]})`,
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:'.6rem'}}>
            BOTTLE FLIP
          </div>
          <div style={{color:'#888',fontSize:'.83rem',lineHeight:2,marginBottom:'1.2rem'}}>
            <span style={{color:'#fff',fontWeight:700}}>Hold</span> = charge power 💪<br/>
            <span style={{color:'#fff',fontWeight:700}}>Release</span> = bottle flip! 🍾<br/>
            <span style={{color:'#ffd93d'}}>Seedha land = points ✅</span><br/>
            <span style={{color:'#ef4444'}}>Tedha land = gir jaata hai ❌</span><br/>
            <span style={{color:'#6bcb77'}}>Combo = zyada points! 🔥</span>
          </div>
          <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:'1.2rem'}}>
            {[['⚡','Short tap'],['💪','Long hold'],['🎯','Perfect +50'],['🔥','Combo']].map(([e,l])=>(
              <div key={e} style={{background:'rgba(255,255,255,.04)',borderRadius:10,padding:'.5rem .3rem',border:'1px solid rgba(255,255,255,.07)',flex:1}}>
                <div style={{fontSize:'1.3rem'}}>{e}</div>
                <div style={{color:'#555',fontSize:'.52rem',marginTop:3}}>{l}</div>
              </div>
            ))}
          </div>
          <button onClick={startGame} style={GB(game.c[0],game.c[1],{maxWidth:240,margin:'0 auto'})}>
            🍾 Flip Shuru Karo!
          </button>
        </div>
      )}

      {ph==='dead'&&(
        <div style={{padding:'1.5rem 0',animation:'bounceIn .4s'}}>
          <div style={{fontSize:'3rem'}}>💀</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",color:'#ef4444',fontSize:'1.2rem',fontWeight:900,margin:'.3rem 0'}}>BOTTLE GIRI!</div>
          <div style={{color:'#ffd93d',fontSize:'1.8rem',fontWeight:900,margin:'.3rem 0'}}>⭐ {score}</div>
          <button onClick={startGame} style={GB(game.c[0],game.c[1],{maxWidth:220,margin:'0 auto .4rem'})}>🔄 Phir Se!</button>
          <button onClick={()=>onEnd(score,game.id)} style={OB('#444',{maxWidth:220,margin:'0 auto'})}>🏁 Score Save</button>
        </div>
      )}
    </div>
  );
}

function BlastZone({game,name,onEnd,onBack}){
  const COLS=13,ROWS=11,TL=26;
  const GW=COLS*TL,GH=ROWS*TL;
  const WALL=1,SOFT=2,FUSE=150,BLAST_DUR=40;

  // 5 levels
  const LVS=[
    {en:2,den:.28,spd:80,range:2,label:'Level 1'},
    {en:3,den:.33,spd:68,range:2,label:'Level 2'},
    {en:5,den:.38,spd:55,range:2,label:'Level 3'},
    {en:7,den:.43,spd:44,range:3,label:'Level 4'},
    {en:9,den:.48,spd:34,range:3,label:'Level 5'},
  ];
  const D4=[[-1,0],[1,0],[0,-1],[0,1]];

  // Power-up types
  const PU_RANGE=1; // 💥 Blast range +1
  const PU_BOMB=2;  // 💣 Extra bomb slot
  const PU_SPEED=3; // 🚀 Player speed boost (move cooldown kam)
  const PU_ICONS={1:'💥',2:'💣',3:'🚀'};
  const PU_COLORS={1:'#f97316',2:'#ef4444',3:'#22c55e'};

  const cvRef=useRef(null);
  const rafRef=useRef(null);
  const gs=useRef(null);
  const running=useRef(false);
  const moveCooldown=useRef(0); // speed boost ke liye
  const [screen,setScreen]=useState('idle');
  const [hud,setHud]=useState({score:0,lives:3,lv:1,time:120});

  function buildGrid(lv){
    const L=LVS[Math.min(lv-1,LVS.length-1)];
    const g=[];
    for(let r=0;r<ROWS;r++){
      g[r]=[];
      for(let c=0;c<COLS;c++){
        if(r===0||r===ROWS-1||c===0||c===COLS-1){g[r][c]=WALL;}
        else if(r%2===0&&c%2===0){g[r][c]=WALL;}
        else{g[r][c]=0;}
      }
    }
    const safe=['1,1','1,2','1,3','2,1','3,1','2,2','3,2','2,3','3,3'];
    for(let r=1;r<ROWS-1;r++)
      for(let c=1;c<COLS-1;c++)
        if(g[r][c]===0&&!safe.includes(r+','+c)&&Math.random()<L.den)
          g[r][c]=SOFT;
    return g;
  }

  function spawnEnemies(grid,count){
    const spots=[];
    for(let r=ROWS-3;r>=5;r--)
      for(let c=COLS-3;c>=5;c--)
        if(grid[r][c]===0) spots.push([r,c]);
    spots.sort(()=>Math.random()-.5);
    return spots.slice(0,count).map(([r,c],id)=>({r,c,id,dir:Math.floor(Math.random()*4),t:0,alive:true}));
  }

  // Power-ups spawn karo kuch SOFT cells ke neeche
  function spawnPowerups(grid){
    const spots=[];
    for(let r=1;r<ROWS-1;r++)
      for(let c=1;c<COLS-1;c++)
        if(grid[r][c]===SOFT) spots.push([r,c]);
    spots.sort(()=>Math.random()-.5);
    const count=Math.min(4, Math.floor(spots.length*0.12)+2);
    const pus=[];
    for(let i=0;i<count&&i<spots.length;i++){
      const [r,c]=spots[i];
      const type=([PU_RANGE,PU_BOMB,PU_SPEED])[Math.floor(Math.random()*3)];
      pus.push({r,c,type,visible:false,collected:false});
    }
    return pus;
  }

  function newState(lv,score,lives){
    const L=LVS[Math.min(lv-1,LVS.length-1)];
    const grid=buildGrid(lv);
    return{
      grid,lv,
      pr:1,pc:1,
      bombs:[],blasts:[],pts:[],
      powerups:spawnPowerups(grid),
      enemies:spawnEnemies(grid,L.en),
      eSpd:L.spd,bRange:L.range,maxBombs:1,
      playerSpd:1, // 1=normal, 2=fast
      score:score||0,lives:lives||3,
      time:130,timeFr:0,frame:0,
      phase:'play',endT:0
    };
  }

  function canMove(s,nr,nc){
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return false;
    if(s.grid[nr][nc]!==0) return false;
    return !s.bombs.some(b=>b.r===nr&&b.c===nc&&!(s.pr===nr&&s.pc===nc));
  }

  function doMove(dir){
    const s=gs.current;
    if(!s||!running.current||s.phase!=='play') return;
    // Speed boost cooldown check
    if(moveCooldown.current>0) return;
    const dirs={up:[-1,0],down:[1,0],left:[0,-1],right:[0,1]};
    const [dr,dc]=dirs[dir];
    const nr=s.pr+dr, nc=s.pc+dc;
    if(canMove(s,nr,nc)){
      s.pr=nr; s.pc=nc;
      // Speed cooldown set karo (fast player = kam cooldown)
      moveCooldown.current=s.playerSpd===2?1:0;
      // Power-up collect check
      const pu=s.powerups.find(p=>!p.collected&&p.visible&&p.r===s.pr&&p.c===s.pc);
      if(pu){
        pu.collected=true;
        applyPowerup(s,pu.type);
        window.SFX&&window.SFX.achieve&&window.SFX.achieve();
        s.pts.push({x:s.pc*TL+TL/2,y:s.pr*TL-4,vy:-2,life:28,txt:PU_ICONS[pu.type]+' GET!',col:PU_COLORS[pu.type]});
      }
      // Hit check
      if(s.blasts.some(b=>b.r===s.pr&&b.c===s.pc)||
         s.enemies.some(e=>e.alive&&e.r===s.pr&&e.c===s.pc)){
        s.phase='lose';s.endT=0;
        window.SFX&&window.SFX.lose&&window.SFX.lose();
      }
    }
  }

  function applyPowerup(s,type){
    if(type===PU_RANGE){s.bRange=Math.min(s.bRange+1,5);}
    else if(type===PU_BOMB){s.maxBombs=Math.min(s.maxBombs+1,3);}
    else if(type===PU_SPEED){s.playerSpd=2;}
  }

  function doBomb(){
    const s=gs.current;
    if(!s||!running.current||s.phase!=='play') return;
    if(s.bombs.filter(b=>b.fuse>0).length>=s.maxBombs) return;
    if(s.bombs.some(b=>b.r===s.pr&&b.c===s.pc&&b.fuse>0)) return;
    s.bombs.push({r:s.pr,c:s.pc,fuse:FUSE,range:s.bRange});
    window.SFX&&window.SFX.bounce&&window.SFX.bounce();
  }

  function explode(s,bomb){
    const cells=[{r:bomb.r,c:bomb.c}];
    for(const [dr,dc] of D4){
      for(let i=1;i<=bomb.range;i++){
        const nr=bomb.r+dr*i, nc=bomb.c+dc*i;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS||s.grid[nr][nc]===WALL) break;
        cells.push({r:nr,c:nc});
        if(s.grid[nr][nc]===SOFT){
          // Power-up reveal karo agar is cell mein hai
          const pu=s.powerups.find(p=>!p.collected&&!p.visible&&p.r===nr&&p.c===nc);
          if(pu) pu.visible=true;
          s.grid[nr][nc]=0;
          break;
        }
      }
    }
    cells.forEach(({r,c})=>s.blasts.push({r,c,t:BLAST_DUR}));
    window.SFX&&window.SFX.pop&&window.SFX.pop();
  }

  function tick(){
    const s=gs.current;
    if(!s) return;
    s.frame++;
    if(moveCooldown.current>0) moveCooldown.current--;

    if(s.phase==='win'||s.phase==='lose'){
      s.endT++;
      if(s.endT>90){
        if(s.phase==='win'){
          const nl=s.lv+1;
          if(nl>LVS.length){running.current=false;setTimeout(()=>onEnd(s.score,game.id),200);}
          else{
            gs.current=newState(nl,s.score,s.lives);
            moveCooldown.current=0;
            setHud({score:s.score,lives:s.lives,lv:nl,time:130});
          }
        } else {
          const nl=s.lives-1;
          if(nl<=0){running.current=false;setTimeout(()=>onEnd(s.score,game.id),200);}
          else{
            gs.current=newState(s.lv,s.score,nl);
            moveCooldown.current=0;
            setHud({score:s.score,lives:nl,lv:s.lv,time:130});
          }
        }
      }
      draw(); return;
    }

    // Timer
    s.timeFr++;
    if(s.timeFr>=60){s.timeFr=0;s.time--;
      if(s.time<=0){s.phase='lose';s.endT=0;window.SFX&&window.SFX.lose&&window.SFX.lose();draw();return;}
    }

    // Bombs tick
    s.bombs.forEach(b=>{if(b.fuse>0){b.fuse--;if(b.fuse===0)explode(s,b);}});
    s.bombs=s.bombs.filter(b=>b.fuse>0);

    // Blasts decay
    s.blasts=s.blasts.map(b=>({...b,t:b.t-1})).filter(b=>b.t>0);

    // Player hit check
    if(s.blasts.some(b=>b.r===s.pr&&b.c===s.pc)||
       s.enemies.some(e=>e.alive&&e.r===s.pr&&e.c===s.pc)){
      s.phase='lose';s.endT=0;
      window.SFX&&window.SFX.lose&&window.SFX.lose();
      draw(); return;
    }

    // Enemies
    for(const e of s.enemies){
      if(!e.alive) continue;
      if(s.blasts.some(b=>b.r===e.r&&b.c===e.c)){
        e.alive=false; s.score+=300;
        s.pts.push({x:e.c*TL+TL/2,y:e.r*TL+TL/2,vy:-2.5,life:24,txt:'+300',col:'#fbbf24'});
        window.SFX&&window.SFX.coin&&window.SFX.coin();
        continue;
      }
      e.t++;
      if(e.t<s.eSpd) continue;
      e.t=0;
      const [dr,dc]=D4[e.dir];
      const nr=e.r+dr, nc=e.c+dc;
      const ok=(r,c)=>r>0&&r<ROWS-1&&c>0&&c<COLS-1&&s.grid[r][c]===0&&!s.bombs.some(b=>b.r===r&&b.c===c);
      if(ok(nr,nc)&&Math.random()>.3){e.r=nr;e.c=nc;}
      else{
        const opts=D4.map(([dr2,dc2],i)=>({i,r:e.r+dr2,c:e.c+dc2})).filter(x=>ok(x.r,x.c));
        if(opts.length){const p=opts[Math.floor(Math.random()*opts.length)];e.dir=p.i;e.r=p.r;e.c=p.c;}
      }
      if(e.r===s.pr&&e.c===s.pc){
        s.phase='lose';s.endT=0;
        window.SFX&&window.SFX.lose&&window.SFX.lose();
      }
    }

    if(s.enemies.every(e=>!e.alive)){
      s.phase='win';s.endT=0;s.score+=500*s.lv;
      window.SFX&&window.SFX.win&&window.SFX.win();
    }

    s.pts=s.pts.map(p=>({...p,y:p.y+p.vy,vy:p.vy+.15,life:p.life-1})).filter(p=>p.life>0);
    setHud({score:s.score,lives:s.lives,lv:s.lv,time:s.time});
    draw();
  }

  function draw(){
    const cv=cvRef.current; if(!cv) return;
    const ctx=cv.getContext('2d');
    const s=gs.current; if(!s) return;

    ctx.fillStyle='#111827'; ctx.fillRect(0,0,GW,GH);

    // Grid
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const x=c*TL,y=r*TL,t=s.grid[r][c];
        if(t===WALL){
          ctx.fillStyle='#1e293b';ctx.fillRect(x,y,TL,TL);
          ctx.fillStyle='#2d3f55';ctx.fillRect(x+1,y+1,TL-2,3);
          ctx.strokeStyle='#334155';ctx.lineWidth=.5;ctx.strokeRect(x,y,TL,TL);
        } else if(t===SOFT){
          ctx.fillStyle='#92400e';ctx.fillRect(x,y,TL,TL);
          ctx.fillStyle='#b45309';ctx.fillRect(x,y,TL,4);
          ctx.strokeStyle='#451a03';ctx.lineWidth=.5;ctx.strokeRect(x,y,TL,TL);
        } else {
          ctx.fillStyle='#0f172a';ctx.fillRect(x,y,TL,TL);
          ctx.strokeStyle='#1e293b';ctx.lineWidth=.5;ctx.strokeRect(x,y,TL,TL);
        }
      }
    }

    // Power-ups (visible ones)
    for(const pu of s.powerups){
      if(!pu.visible||pu.collected) continue;
      const x=pu.c*TL,y=pu.r*TL;
      // Glowing background
      ctx.fillStyle=PU_COLORS[pu.type]+'44';ctx.fillRect(x+1,y+1,TL-2,TL-2);
      ctx.strokeStyle=PU_COLORS[pu.type];ctx.lineWidth=1.5;ctx.strokeRect(x+2,y+2,TL-4,TL-4);
      // Bounce animation
      const bob=Math.sin(s.frame*.15)*2;
      ctx.font=`${TL*.7}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(PU_ICONS[pu.type],x+TL/2,y+TL/2+bob);
      ctx.textBaseline='alphabetic';
    }

    // Blasts
    for(const b of s.blasts){
      const x=b.c*TL,y=b.r*TL,a=b.t/BLAST_DUR;
      ctx.fillStyle=`rgba(251,146,60,${a*.85})`;ctx.fillRect(x,y,TL,TL);
      ctx.fillStyle=`rgba(255,255,255,${a*.4})`;ctx.fillRect(x+4,y+4,TL-8,TL-8);
    }

    // Bombs
    for(const b of s.bombs){
      const x=b.c*TL+TL/2,y=b.r*TL+TL/2,prog=b.fuse/FUSE;
      ctx.save();
      ctx.fillStyle='#1f2937';ctx.beginPath();ctx.arc(x,y+1,TL*.33,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#374151';ctx.beginPath();ctx.arc(x-1,y-1,TL*.28,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;ctx.shadowColor='#fbbf24';ctx.shadowBlur=6;
      ctx.beginPath();ctx.moveTo(x,y-TL*.3);ctx.quadraticCurveTo(x+TL*.2,y-TL*.5,x+TL*.15,y-TL*.6);ctx.stroke();
      if(Math.floor(s.frame/4)%2===0){ctx.fillStyle='#fff';ctx.shadowBlur=0;ctx.beginPath();ctx.arc(x+TL*.15,y-TL*.6,2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(b.c*TL,b.r*TL+TL-4,TL,4);
      ctx.fillStyle=prog>.4?'#fbbf24':'#ef4444';ctx.fillRect(b.c*TL,b.r*TL+TL-4,TL*prog,4);
    }

    // Enemies
    for(const e of s.enemies){
      if(!e.alive) continue;
      const x=e.c*TL+TL/2,y=e.r*TL+TL/2,bob=Math.sin(s.frame*.12+e.id)*1.5;
      ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#7c3aed';
      ctx.fillStyle='#6d28d9';ctx.beginPath();ctx.ellipse(x,y+2+bob,TL*.36,TL*.3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#8b5cf6';ctx.beginPath();ctx.ellipse(x,y-TL*.17+bob,TL*.26,TL*.24,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fde68a';ctx.shadowBlur=4;
      ctx.beginPath();ctx.arc(x-3.5,y-TL*.19+bob,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+3.5,y-TL*.19+bob,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1e1b4b';ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(x-3.5,y-TL*.19+bob,1.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+3.5,y-TL*.19+bob,1.2,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    // Player NOVA
    {
      const x=s.pc*TL+TL/2,y=s.pr*TL+TL/2;
      const spd=s.playerSpd===2;
      ctx.save();
      ctx.shadowBlur=spd?20:14;ctx.shadowColor=spd?'#22c55e':'#f97316';
      ctx.fillStyle=spd?'#16a34a':'#ea580c';
      ctx.beginPath();ctx.ellipse(x,y+2,TL*.35,TL*.3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=spd?'#4ade80':'#fb923c';
      ctx.beginPath();ctx.ellipse(x,y-TL*.17,TL*.26,TL*.24,0,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(x-3.5,y-TL*.19,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+3.5,y-TL*.19,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(x-3.5,y-TL*.19,1.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+3.5,y-TL*.19,1.2,0,Math.PI*2);ctx.fill();
      // Speed boost indicator
      if(spd){
        ctx.fillStyle='#22c55e';ctx.font='bold 8px monospace';ctx.textAlign='center';
        ctx.fillText('⚡',x,y-TL*.45);
      }
      ctx.restore();
    }

    // Particles / score popups
    for(const p of s.pts){
      ctx.save();ctx.globalAlpha=Math.min(1,p.life/16);
      ctx.fillStyle=p.col;ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillText(p.txt,p.x,p.y);ctx.restore();
    }

    // Win/Lose overlay
    if(s.phase==='win'||s.phase==='lose'){
      ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,GW,GH);
      ctx.textAlign='center';
      if(s.phase==='win'){
        ctx.fillStyle='#fbbf24';ctx.font='bold 17px monospace';ctx.fillText('LEVEL CLEAR! 💥',GW/2,GH/2-10);
        ctx.fillStyle='#6bcb77';ctx.font='11px monospace';
        ctx.fillText(s.lv<LVS.length?'NEXT LEVEL →':'ALL CLEAR! 🏆',GW/2,GH/2+12);
      } else {
        ctx.fillStyle='#ef4444';ctx.font='bold 17px monospace';ctx.fillText('BOOM! 💀',GW/2,GH/2-10);
        ctx.fillStyle='#aaa';ctx.font='11px monospace';ctx.fillText(s.lives>1?'Retry...':'GAME OVER',GW/2,GH/2+12);
      }
    }
  }

  function gameLoop(){
    if(!running.current) return;
    tick();
    rafRef.current=requestAnimationFrame(gameLoop);
  }

  function startGame(){
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    gs.current=newState(1,0,3);
    moveCooldown.current=0;
    running.current=true;
    setScreen('run');
    setHud({score:0,lives:3,lv:1,time:130});
    rafRef.current=requestAnimationFrame(gameLoop);
  }

  useEffect(()=>{
    const h=e=>{
      if(e.key==='ArrowUp'||e.key==='w'){e.preventDefault();doMove('up');}
      else if(e.key==='ArrowDown'||e.key==='s'){e.preventDefault();doMove('down');}
      else if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();doMove('left');}
      else if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();doMove('right');}
      else if(e.key===' '||e.key==='Enter'){e.preventDefault();doBomb();}
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);

  useEffect(()=>()=>{
    running.current=false;
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
  },[]);

  const MBtn=({onAct,children,bStyle={}})=>React.createElement('div',{
    style:{
      width:64,height:64,
      background:'rgba(234,88,12,.9)',
      border:'2px solid rgba(251,146,60,.6)',
      borderRadius:12,
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:'1.6rem',
      userSelect:'none',WebkitUserSelect:'none',
      WebkitTapHighlightColor:'transparent',
      touchAction:'none',cursor:'pointer',
      boxShadow:'0 3px 12px rgba(0,0,0,.5)',
      ...bStyle,
    },
    onPointerDown(e){e.preventDefault();onAct();}
  },children);

  // Power-up status bar
  const PuBar=()=>{
    const s=gs.current; if(!s) return null;
    return React.createElement('div',{
      style:{display:'flex',gap:6,justifyContent:'center',marginTop:4,fontSize:'.7rem',fontFamily:'monospace'}
    },[
      React.createElement('span',{key:'r',style:{color:'#f97316',background:'rgba(249,115,22,.1)',padding:'2px 7px',borderRadius:6,border:'1px solid rgba(249,115,22,.3)'}},
        `💥 Range: ${s.bRange}`),
      React.createElement('span',{key:'b',style:{color:'#ef4444',background:'rgba(239,68,68,.1)',padding:'2px 7px',borderRadius:6,border:'1px solid rgba(239,68,68,.3)'}},
        `💣 Bombs: ${s.maxBombs}`),
      s.playerSpd===2&&React.createElement('span',{key:'s',style:{color:'#22c55e',background:'rgba(34,197,94,.1)',padding:'2px 7px',borderRadius:6,border:'1px solid rgba(34,197,94,.3)'}},
        '🚀 FAST'),
    ].filter(Boolean));
  };

  return (
    <div style={{textAlign:'center',padding:'.4rem',width:'100%',maxWidth:420,margin:'0 auto'}}>
      <TopBar name={name} onBack={()=>{running.current=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);onBack();}} game={game}/>

      {screen==='run'&&<>
        <div style={{display:'flex',justifyContent:'space-between',padding:'3px 8px',background:'rgba(0,0,0,.7)',borderRadius:'8px 8px 0 0',maxWidth:GW,margin:'0 auto',fontFamily:'monospace',fontSize:'.7rem',fontWeight:700}}>
          <span style={{color:'#fbbf24'}}>⭐{hud.score}</span>
          <span style={{color:'#fff'}}>LV {hud.lv}/{LVS.length}</span>
          <span style={{color:hud.time<=20?'#ef4444':'#6bcb77'}}>⏱{hud.time}s</span>
          <span style={{color:'#f87171'}}>❤️×{hud.lives}</span>
        </div>

        <canvas ref={cvRef} width={GW} height={GH}
          style={{display:'block',margin:'0 auto',maxWidth:'100%',
            border:'2px solid rgba(249,115,22,.4)',borderTop:'none',
            borderRadius:'0 0 8px 8px',touchAction:'none'}}/>

        <PuBar/>

        <div style={{marginTop:8,display:'flex',alignItems:'center',justifyContent:'center',gap:24}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
            <MBtn onAct={()=>doMove('up')}>⬆️</MBtn>
            <div style={{display:'flex',gap:5,alignItems:'center'}}>
              <MBtn onAct={()=>doMove('left')}>⬅️</MBtn>
              <div style={{width:64,height:64,display:'flex',alignItems:'center',justifyContent:'center',color:'#333',fontSize:'.55rem',fontFamily:'monospace',fontWeight:700}}>MOVE</div>
              <MBtn onAct={()=>doMove('right')}>➡️</MBtn>
            </div>
            <MBtn onAct={()=>doMove('down')}>⬇️</MBtn>
          </div>
          <MBtn onAct={doBomb} bStyle={{width:76,height:76,borderRadius:'50%',fontSize:'2rem',background:'rgba(220,38,38,.9)',border:'3px solid rgba(252,165,165,.5)',boxShadow:'0 0 20px rgba(220,38,38,.5)'}}>💣</MBtn>
        </div>
        <div style={{color:'#444',fontSize:'.55rem',marginTop:4}}>
          💥=Blast+ &nbsp; 💣=Extra Bomb &nbsp; 🚀=Speed &nbsp;|&nbsp; Walls tod ke power-up lo!
        </div>
      </>}

      {screen==='idle'&&<div style={{padding:'1rem 0'}}>
        <div style={{fontSize:'2.8rem',marginBottom:'.4rem'}}>💣</div>
        <div style={{fontFamily:'monospace',fontSize:'1.1rem',fontWeight:900,color:'#f97316',marginBottom:'.4rem'}}>BLAST ZONE</div>
        <div style={{color:'#555',fontSize:'.75rem',marginBottom:'.8rem',lineHeight:1.8}}>
          NOVA ko control karo - Aliens ko blast karo!<br/>
          Walls tod ke power-ups uthao • 5 Levels
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:'1rem',flexWrap:'wrap'}}>
          {[['💥','Blast Range+'],['💣','Extra Bomb'],['🚀','Speed Boost'],['👾','+300 pts'],['⏱','130s/level']].map(([e,l])=>(
            <div key={e} style={{background:'rgba(249,115,22,.08)',borderRadius:9,padding:'.3rem .5rem',border:'1px solid rgba(249,115,22,.2)',textAlign:'center',minWidth:58}}>
              <div style={{fontSize:'.95rem'}}>{e}</div>
              <div style={{color:'#555',fontSize:'.5rem',marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
        <button onClick={startGame} style={GB(game.c[0],game.c[1],{maxWidth:220,margin:'0 auto'})}>💣 Start!</button>
      </div>}
    </div>
  );
}


function GeoDash({game,name,onEnd,onBack}){
  const W=320,GH=340;
  const GROUND=GH-36;
  const [score,setS]=useState(0);
  const [ph,setPh]=useState("idle");
  const [best,setBest]=useState(()=>{try{return parseInt(localStorage.getItem("gd_best")||"0");}catch(e){return 0;}});

  const cR=useRef(null),rafR=useRef(null),phR=useRef("idle");
  const pR=useRef({x:60,y:GROUND-22,vy:0,onGround:true,rot:0});
  const wallsR=useRef([]);
  const scoreR=useRef(0);
  const frameR=useRef(0);
  const speedR=useRef(3.2);
  const lastWallR=useRef(240);
  const holdR=useRef(false);   // is finger/mouse held down?
  const jumpCoolR=useRef(0);  // cooldown between jumps

  const AC=()=>window.getAC&&window.getAC();
  const sndJump=()=>{try{const c=AC();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(480,c.currentTime);o.frequency.exponentialRampToValueAtTime(760,c.currentTime+.1);g.gain.setValueAtTime(.22,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.13);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.15);}catch(e){}};
  const sndDie=()=>{try{const c=AC();if(!c)return;[380,260,180,90].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.3,c.currentTime+i*.09);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.09+.18);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.09);o.stop(c.currentTime+i*.09+.22);});}catch(e){}};
  const sndPass=()=>{try{const c=AC();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(700,c.currentTime);o.frequency.exponentialRampToValueAtTime(1100,c.currentTime+.08);g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.1);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.12);}catch(e){}};

  const doJump=()=>{
    const p=pR.current;
    if(jumpCoolR.current>0)return;
    p.vy=-5;
    p.onGround=false;
    jumpCoolR.current=6;
    sndJump();
  };

  const pressStart=()=>{
    if(phR.current==="idle"){startGame();return;}
    if(phR.current!=="running")return;
    holdR.current=true;
    doJump();
  };

  const pressEnd=()=>{ holdR.current=false; };

  const gameLoop=useCallback(()=>{
    if(phR.current!=="running")return;
    frameR.current++;
    const spd=speedR.current;
    if(jumpCoolR.current>0) jumpCoolR.current--;

    // Hold = keep jumping when on ground
    if(holdR.current && jumpCoolR.current===0) doJump();

    // Speed ramp
    if(frameR.current%280===0) speedR.current=Math.min(9,speedR.current+0.35);

    // Spawn walls
    lastWallR.current-=spd;
    if(lastWallR.current<=0){
      const gapH=95+Math.random()*35;
      const gapY=25+Math.random()*(GROUND-gapH-55);
      wallsR.current.push({x:W+10,gapY,gapH,w:26,passed:false});
      lastWallR.current=300+Math.random()*150;
    }

    // Move walls
    wallsR.current=wallsR.current.map(w=>({...w,x:w.x-spd})).filter(w=>w.x>-50);

    // Physics
    const p=pR.current;
    p.vy=Math.min(p.vy+0.42,8);
    p.y+=p.vy;
    p.rot+= p.onGround ? 3 : (p.vy<0?-9:9);

    // Ground
    if(p.y>=GROUND-9){
      p.y=GROUND-9;p.vy=0;p.onGround=true;p.jumpsLeft=2;
    } else {
      p.onGround=false;
    }
    // Ceiling
    if(p.y<8){p.y=8;p.vy=Math.abs(p.vy)*0.3;}

    // Score
    wallsR.current.forEach(w=>{
      if(!w.passed&&w.x+w.w<p.x-8){
        w.passed=true;scoreR.current++;setS(scoreR.current);sndPass();
      }
    });

    // Collision — tighter hitbox (14px radius)
    const HR=5;
    let dead=false;
    wallsR.current.forEach(w=>{
      if(p.x+HR>w.x && p.x-HR<w.x+w.w){
        if(p.y-HR<w.gapY || p.y+HR>w.gapY+w.gapH) dead=true;
      }
    });

    if(dead){
      phR.current="dead";sndDie();
      const fs=scoreR.current;
      try{const b=parseInt(localStorage.getItem("gd_best")||"0");if(fs>b){localStorage.setItem("gd_best",""+fs);setBest(fs);}}catch(e){}
      setTimeout(()=>{setPh("idle");phR.current="idle";},1600);
      onEnd(fs,game.id);
    }

    // ==== DRAW ====
    const cv=cR.current;if(!cv)return;
    const ctx=cv.getContext("2d");

    // Background
    const bg=ctx.createLinearGradient(0,0,0,GH);
    bg.addColorStop(0,"#162d5c");bg.addColorStop(1,"#0b1628");
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,GH);

    // Moving BG grid
    ctx.strokeStyle="rgba(77,130,255,0.07)";ctx.lineWidth=1;
    const ts=44,off=(frameR.current*spd)%ts;
    for(let x=-off;x<W;x+=ts) for(let y=0;y<GH;y+=ts) ctx.strokeRect(x,y,ts,ts);

    // Ground
    ctx.fillStyle="#3a80ff";ctx.fillRect(0,GROUND,W,3);
    ctx.fillStyle="rgba(40,80,180,0.35)";ctx.fillRect(0,GROUND+3,W,GH-GROUND-3);

    // Walls
    wallsR.current.forEach(w=>{
      [  {y:0,h:w.gapY},  {y:w.gapY+w.gapH,h:GROUND-(w.gapY+w.gapH)}  ].forEach(seg=>{
        if(seg.h<=0)return;
        // Main block
        const wg=ctx.createLinearGradient(w.x,0,w.x+w.w,0);
        wg.addColorStop(0,"#162348");wg.addColorStop(0.5,"#1e3368");wg.addColorStop(1,"#162348");
        ctx.fillStyle=wg;ctx.fillRect(w.x,seg.y,w.w,seg.h);
        // Border glow
        ctx.strokeStyle="#4d96ff";ctx.lineWidth=1.5;ctx.strokeRect(w.x,seg.y,w.w,seg.h);
        // Inner lines (block texture)
        ctx.strokeStyle="rgba(77,150,255,0.18)";ctx.lineWidth=1;
        for(let wy=seg.y+18;wy<seg.y+seg.h;wy+=18){
          ctx.beginPath();ctx.moveTo(w.x+2,wy);ctx.lineTo(w.x+w.w-2,wy);ctx.stroke();
        }
        // Top/bottom edge glow of gap
      });
      // Gap edge lines
      ctx.strokeStyle="rgba(100,200,255,0.55)";ctx.lineWidth=2;
      if(w.gapY>0){ctx.beginPath();ctx.moveTo(w.x,w.gapY);ctx.lineTo(w.x+w.w,w.gapY);ctx.stroke();}
      if(w.gapY+w.gapH<GROUND){ctx.beginPath();ctx.moveTo(w.x,w.gapY+w.gapH);ctx.lineTo(w.x+w.w,w.gapY+w.gapH);ctx.stroke();}
    });

    // Trail
    for(let i=4;i>=1;i--){
      ctx.beginPath();
      ctx.arc(p.x - i*spd*1.8, p.y, (16-i*3), 0, Math.PI*2);
      ctx.fillStyle=`rgba(80,180,255,${0.06*i})`;ctx.fill();
    }

    // Player triangle (rainbow, rotating)
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot*Math.PI/180);
    const gr=ctx.createLinearGradient(-18,-18,18,18);
    gr.addColorStop(0,"#ff0080");gr.addColorStop(0.33,"#00ffaa");
    gr.addColorStop(0.66,"#00aaff");gr.addColorStop(1,"#cc00ff");
    ctx.fillStyle=gr;
    ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(6,5);ctx.lineTo(-6,5);ctx.closePath();
    ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.85)";ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,0.25)";
    ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(3,2);ctx.lineTo(-3,2);ctx.closePath();ctx.fill();
    ctx.restore();

    // HUD
    ctx.fillStyle="rgba(255,255,255,0.88)";ctx.font="bold 15px 'Orbitron',monospace";ctx.textAlign="left";
    ctx.fillText("⭐ "+scoreR.current,10,22);
    ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="11px monospace";ctx.textAlign="right";
    ctx.fillText("BEST "+best,W-8,22);

    // Speed bar
    const spdPct=(speedR.current-3.2)/(9-3.2);
    ctx.fillStyle="rgba(255,255,255,0.08)";ctx.fillRect(8,GH-10,W-16,4);
    ctx.fillStyle=`rgba(${Math.floor(spdPct*255)},${Math.floor((1-spdPct)*180+75)},255,0.7)`;
    ctx.fillRect(8,GH-10,(W-16)*spdPct,4);

    // Dead flash
    if(phR.current==="dead"){
      ctx.fillStyle="rgba(255,50,50,0.55)";ctx.fillRect(0,0,W,GH);
      ctx.fillStyle="#fff";ctx.font="bold 24px monospace";ctx.textAlign="center";
      ctx.fillText("💥 CRASHED!",W/2,GH/2-8);
      ctx.fillStyle="#ffaaaa";ctx.font="14px monospace";
      ctx.fillText("Score: "+scoreR.current,W/2,GH/2+18);
    }

    rafR.current=requestAnimationFrame(gameLoop);
  },[onEnd,game,best]);

  const startGame=()=>{
    pR.current={x:60,y:GROUND-9,vy:0,onGround:true,rot:0,jumpsLeft:2};
    wallsR.current=[];scoreR.current=0;frameR.current=0;
    speedR.current=3.2;lastWallR.current=350;holdR.current=false;jumpCoolR.current=0;
    phR.current="running";setPh("running");setS(0);
    if(rafR.current)cancelAnimationFrame(rafR.current);
    rafR.current=requestAnimationFrame(gameLoop);
  };

  useEffect(()=>()=>{if(rafR.current)cancelAnimationFrame(rafR.current);},[]);

  // Keyboard
  useEffect(()=>{
    const kd=e=>{if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();if(!e.repeat){if(phR.current==="idle"){startGame();}else{holdR.current=true;doJump();}}}};
    const ku=e=>{if(e.code==="Space"||e.code==="ArrowUp") holdR.current=false;};
    window.addEventListener("keydown",kd);window.addEventListener("keyup",ku);
    return()=>{window.removeEventListener("keydown",kd);window.removeEventListener("keyup",ku);};
  },[]);

  return(<div style={{textAlign:"center",padding:"1rem .5rem",width:"100%",maxWidth:360,margin:"0 auto"}}>
    <TopBar name={name} onBack={()=>{phR.current="idle";holdR.current=false;if(rafR.current)cancelAnimationFrame(rafR.current);onBack();}} game={game}/>
    <div style={{textAlign:"center",marginBottom:".3rem"}}>
      <span style={{fontSize:".68rem",fontFamily:"monospace",background:"linear-gradient(135deg,rgba(77,150,255,.15),rgba(168,85,247,.15))",border:"1px solid rgba(168,85,247,.4)",borderRadius:20,padding:"3px 12px",color:"#fff"}}>💡 Game Idea: <b style={{background:"linear-gradient(90deg,#4d96ff,#a855f7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>@shifu_diwan_27</b></span>
    </div>
    <canvas ref={cR} width={W} height={GH}
      onMouseDown={e=>{e.preventDefault();pressStart();}}
      onMouseUp={pressEnd}
      onMouseLeave={pressEnd}
      onTouchStart={e=>{e.preventDefault();pressStart();}}
      onTouchEnd={e=>{e.preventDefault();pressEnd();}}
      style={{borderRadius:12,border:"2px solid rgba(77,150,255,0.35)",maxWidth:"100%",touchAction:"none",display:"block",margin:"0 auto",cursor:"pointer"}}/>
    {ph==="idle"&&<div style={{marginTop:".7rem"}}>
      <div style={{color:"#4d96ff",fontSize:".78rem",fontFamily:"monospace",marginBottom:".5rem",lineHeight:1.6}}>
        📱 Tap karo = Jump | Rapid tap = upar jao<br/>
        ⌨️ Space/↑ = jump
      </div>
      <button onClick={startGame} style={GB(game.c[0],game.c[1],{maxWidth:220,margin:"0 auto"})}>🔺 Start!</button>
      {best>0&&<div style={{color:"#555",fontSize:".65rem",marginTop:".4rem",fontFamily:"monospace"}}>🏆 Best: {best} walls</div>}
    </div>}
  </div>);
}
