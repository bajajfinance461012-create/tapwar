              {/* Rank/file labels */}
              {c===0&&<span style={{position:"absolute",top:1,left:2,fontSize:"8px",color:lt?darkSq:lightSq,opacity:.7,lineHeight:1}}>{8-r}</span>}
              {r===7&&<span style={{position:"absolute",bottom:1,right:2,fontSize:"8px",color:lt?darkSq:lightSq,opacity:.7,lineHeight:1}}>{String.fromCharCode(97+c)}</span>}
            </div>;
          })}
        </div>
      ))}
    </div>
    {/* Status bar */}
    <div style={{maxWidth:SQ*8,margin:".3rem auto 0",display:"flex",gap:6,alignItems:"center",justifyContent:"space-between",padding:"0 2px"}}>
      {status==="playing"&&<div style={{display:"flex",gap:6,alignItems:"center"}}>
        <div style={{width:14,height:14,borderRadius:"50%",background:turn==="w"?"#fff":"#222",border:`2px solid ${turn==="w"?"#ccc":"#888"}`,boxShadow:turn==="w"?"0 0 8px #fff":"0 0 8px #666"}}/>
        <span style={{color:"#888",fontSize:".72rem",fontWeight:700}}>{turn==="w"?"Tumhari baari":""}</span>
        {check&&<span style={{color:"#ff4444",fontSize:".72rem",fontWeight:900,animation:"pulse .5s infinite"}}>CHECK!</span>}
      </div>}
      {(status==="won"||status==="lost")&&<div style={{color:status==="won"?"#6bcb77":"#ff4444",fontFamily:"'Orbitron',sans-serif",fontSize:".88rem",fontWeight:900,animation:"bounceIn .4s"}}>{status==="won"?"🏆 JEET!":"💀 HAAR!"}</div>}
      {status==="playing"&&<button onClick={()=>{setSel(null);setHints([]);}} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"#666",fontSize:".65rem",padding:"3px 9px",borderRadius:8,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>}
    </div>
    {/* Buttons */}
    <div style={{maxWidth:SQ*8,margin:".4rem auto 0",display:"flex",gap:7}}>
      <button onClick={reset} style={{...OB("#888",{flex:1,marginBottom:0,fontSize:".78rem",padding:".5rem"})}}>🔄 New</button>
      {(status==="won"||status==="lost")&&<button onClick={()=>onEnd(moveCount*5,game.id)} style={{...GB(game.c[0],game.c[1],{flex:2,marginBottom:0,fontSize:".8rem",padding:".5rem"})}}>🏁 Score Save</button>}
    </div>
  </div>);
}

function SoccerTap({game,name,onEnd,onBack}){
  // Canvas-based soccer with real feel
  const W=320,H=420;
  const [score,setS]=useState(0),[time,setTm]=useState(45),[ph,setPh]=useState("idle"),[streak,setStrk]=useState(0);
  const cR=useRef(null),rafR=useRef(null),tmR=useRef(null),phR=useRef("idle");
  const st=useRef({
    score:0,streak:0,
    ball:{x:W/2,y:H-70,vx:0,vy:0,spin:0,flying:false,done:false},
    gk:{x:W/2,vx:2.5,dir:1,diving:false,diveX:0,diveT:0},
    phase:"aim",   // aim | power | shooting | result
    power:0,powerDir:1,
    aimX:W/2,
    result:null,resultTick:0,
    particles:[],
    netShake:0,
    swipeStart:null,
    crowd:0,
  });

  const sndKick=()=>{try{const C=window.getAC();const o=C.createOscillator(),g=C.createGain();o.type="sine";o.frequency.setValueAtTime(180,C.currentTime);o.frequency.exponentialRampToValueAtTime(80,C.currentTime+.15);g.gain.setValueAtTime(.7,C.currentTime);g.gain.exponentialRampToValueAtTime(.001,C.currentTime+.18);o.connect(g);g.connect(C.destination);o.start();o.stop(C.currentTime+.2);const o2=C.createOscillator(),g2=C.createGain();o2.type="square";o2.frequency.setValueAtTime(600,C.currentTime);g2.gain.setValueAtTime(.25,C.currentTime);g2.gain.exponentialRampToValueAtTime(.001,C.currentTime+.05);o2.connect(g2);g2.connect(C.destination);o2.start();o2.stop(C.currentTime+.06);}catch(e){}};
  const sndGoal=()=>{try{const C=window.getAC();[330,440,550,660,880].forEach((f,i)=>{const o=C.createOscillator(),g=C.createGain();o.type="sine";o.frequency.setValueAtTime(f,C.currentTime+i*.07);g.gain.setValueAtTime(.4,C.currentTime+i*.07);g.gain.exponentialRampToValueAtTime(.001,C.currentTime+i*.07+.3);o.connect(g);g.connect(C.destination);o.start(C.currentTime+i*.07);o.stop(C.currentTime+i*.07+.35);});const buf=C.createBuffer(1,C.sampleRate*.8,C.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/d.length;d[i]=(Math.random()*2-1)*(t<.1?t*10:1-t)*.2;}const src=C.createBufferSource(),g2=C.createGain(),f=C.createBiquadFilter();f.type="lowpass";f.frequency.value=800;g2.gain.value=.3;src.buffer=buf;src.connect(f);f.connect(g2);g2.connect(C.destination);src.start();}catch(e){}};
  const sndSave=()=>{try{const C=window.getAC();const o=C.createOscillator(),g=C.createGain();o.type="sawtooth";o.frequency.setValueAtTime(200,C.currentTime);o.frequency.exponentialRampToValueAtTime(60,C.currentTime+.3);g.gain.setValueAtTime(.4,C.currentTime);g.gain.exponentialRampToValueAtTime(.001,C.currentTime+.35);o.connect(g);g.connect(C.destination);o.start();o.stop(C.currentTime+.38);}catch(e){}};
  const sndPowerup=()=>{try{const C=window.getAC();const o=C.createOscillator(),g=C.createGain();o.type="triangle";o.frequency.setValueAtTime(300,C.currentTime);o.frequency.linearRampToValueAtTime(600,C.currentTime+.15);g.gain.setValueAtTime(.15,C.currentTime);g.gain.exponentialRampToValueAtTime(.001,C.currentTime+.18);o.connect(g);g.connect(C.destination);o.start();o.stop(C.currentTime+.2);}catch(e){}};

  const spawnParts=(x,y,col,n)=>{const s=st.current;for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;s.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:35+Math.random()*20,maxLife:55,r:3+Math.random()*4,col});}};

  const draw=()=>{
    const cv=cR.current;if(!cv)return;
    const ctx=cv.getContext("2d");const s=st.current;

    // === STADIUM BG ===
    // Sky gradient
    const sky=ctx.createLinearGradient(0,0,0,H*.35);
    sky.addColorStop(0,"#0a1628");sky.addColorStop(1,"#1a3a6e");
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*.35);
    // Stadium lights glow
    [[50,20],[W-50,20],[25,60],[W-25,60]].forEach(([lx,ly])=>{
      const lg=ctx.createRadialGradient(lx,ly,2,lx,ly,60);
      lg.addColorStop(0,"rgba(255,255,200,.5)");lg.addColorStop(.3,"rgba(255,255,200,.1)");lg.addColorStop(1,"transparent");
      ctx.fillStyle=lg;ctx.fillRect(0,0,W,H*.35);
      ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.fillStyle="#ffffcc";ctx.fill();
    });
    // Crowd
    s.crowd+=.04;
    const crowdCols=["#ff6b6b","#4d96ff","#ffd93d","#6bcb77","#a855f7","#f97316","#ec4899","#06b6d4"];
    for(let i=0;i<50;i++){
      const wave=Math.sin(i*.5+s.crowd+(i%3)*.8);
      ctx.beginPath();ctx.arc(4+i*6.3,H*.22+wave*5,4,0,Math.PI*2);
      ctx.fillStyle=crowdCols[i%8];ctx.fill();
      // Waving arms
      if(wave>.7){ctx.strokeStyle=crowdCols[i%8];ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(4+i*6.3,H*.18+wave*5);ctx.lineTo(4+i*6.3-3,H*.12);ctx.stroke();}
    }
    // Stands top
    ctx.fillStyle="#1a2a4e";ctx.fillRect(0,0,W,H*.18);
    // Crowd row 2
    for(let i=0;i<40;i++){
      ctx.beginPath();ctx.arc(8+i*8,H*.15+Math.sin(i*.4+s.crowd*.8)*3,3.5,0,Math.PI*2);
      ctx.fillStyle=crowdCols[(i+3)%8];ctx.fill();
    }

    // === GROUND ===
    // Main grass
    const grassG=ctx.createLinearGradient(0,H*.35,0,H);
    grassG.addColorStop(0,"#2d7a2d");grassG.addColorStop(.5,"#388E3C");grassG.addColorStop(1,"#1b5e20");
    ctx.fillStyle=grassG;ctx.fillRect(0,H*.35,W,H*.65);
    // Grass stripes (mowing pattern)
    for(let i=0;i<8;i++){
      ctx.fillStyle=i%2===0?"rgba(255,255,255,.025)":"transparent";
      ctx.fillRect(i*(W/8),H*.35,W/8,H*.65);
    }
    // Field markings - center circle area
    ctx.strokeStyle="rgba(255,255,255,.18)";ctx.lineWidth=1.5;
    // Penalty spot
    ctx.beginPath();ctx.arc(W/2,H*.72,3,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,.5)";ctx.fill();
    // Penalty arc
    ctx.beginPath();ctx.arc(W/2,H*.72,50,0,Math.PI);ctx.stroke();
    // Goal area box
    ctx.strokeRect(W/2-60,H*.35,120,40);
    // 6-yard box
    ctx.strokeRect(W/2-30,H*.35,60,20);

    // === GOAL ===
    const GW=200,GX=(W-GW)/2,GH=80;
    const netShakeX=s.netShake>0?(Math.random()-.5)*s.netShake:0;
    // Goal posts
    ctx.shadowBlur=12;ctx.shadowColor="rgba(200,200,200,.6)";
    ctx.fillStyle="#e8e8e8";
    ctx.fillRect(GX-5+netShakeX,H*.35-GH,8,GH);          // left post
    ctx.fillRect(GX+GW-3+netShakeX,H*.35-GH,8,GH);       // right post
    ctx.fillRect(GX-5+netShakeX,H*.35-GH-6,GW+16,8);     // crossbar
    ctx.shadowBlur=0;
    // Net
    ctx.save();ctx.translate(netShakeX,0);
    ctx.strokeStyle="rgba(220,220,220,.35)";ctx.lineWidth=.8;
    for(let nx=0;nx<=10;nx++){ctx.beginPath();ctx.moveTo(GX+nx*(GW/10),H*.35-GH);ctx.lineTo(GX+nx*(GW/10),H*.35);ctx.stroke();}
    for(let ny=0;ny<=5;ny++){ctx.beginPath();ctx.moveTo(GX,H*.35-GH+ny*(GH/5));ctx.lineTo(GX+GW,H*.35-GH+ny*(GH/5));ctx.stroke();}
    ctx.restore();
    if(s.netShake>0)s.netShake=Math.max(0,s.netShake-1);

    // === GOALKEEPER ===
    const gk=s.gk;
    if(!gk.diving){
      // Normal movement
      gk.x+=gk.vx*gk.dir;
      if(gk.x>GX+GW-25)gk.dir=-1;
      if(gk.x<GX+25)gk.dir=1;
    }else{
      // Dive animation
      gk.diveT+=.12;
      gk.x+=gk.diving==="left"?-8:8;
      if(gk.diveT>1.5)gk.diving=false;
    }
    // GK body
    ctx.save();ctx.translate(gk.x,H*.37);
    if(gk.diving){ctx.rotate(gk.diving==="left"?-.6:.6);}
    // GK jersey (yellow-green)
    ctx.fillStyle="#d4ed26";ctx.beginPath();ctx.roundRect(-14,-32,28,32,4);ctx.fill();
    ctx.strokeStyle="#b8d118";ctx.lineWidth=1.5;ctx.stroke();
    // GK number
    ctx.fillStyle="#2d5a00";ctx.font="bold 10px Arial";ctx.textAlign="center";ctx.fillText("1",0,-18);
    // Head
    ctx.beginPath();ctx.arc(0,-38,10,0,Math.PI*2);ctx.fillStyle="#f5c5a0";ctx.fill();
    // Gloves
    ctx.fillStyle="#ff8c00";
    ctx.fillRect(-18,-25,8,12);ctx.fillRect(10,-25,8,12);
    ctx.restore();

    // === AIM INDICATOR ===
    const ball=s.ball;
    if(s.phase==="aim"||s.phase==="power"){
      // Dotted aim line
      const aimY=H*.36;
      ctx.setLineDash([6,5]);
      ctx.strokeStyle="rgba(255,255,100,.5)";ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(ball.x,ball.y);ctx.lineTo(s.aimX,aimY);ctx.stroke();
      ctx.setLineDash([]);
      // Aim target circle
      const tpulse=.8+.2*Math.sin(Date.now()*.008);
      ctx.beginPath();ctx.arc(s.aimX,aimY,10*tpulse,0,Math.PI*2);
      ctx.strokeStyle="rgba(255,255,100,.7)";ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(s.aimX,aimY,3,0,Math.PI*2);ctx.fillStyle="#ffd93d";ctx.fill();
    }
    if(s.phase==="power"){
      // Power meter bar
      const barW=120,barH=16,bx=W/2-barW/2,by=H-28;
      ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(bx-2,by-2,barW+4,barH+4);
      const pwrCol=s.power<.4?"#6bcb77":s.power<.75?"#ffd93d":"#ff4444";
      ctx.fillStyle=pwrCol;ctx.fillRect(bx,by,barW*s.power,barH);
      ctx.strokeStyle="rgba(255,255,255,.4)";ctx.lineWidth=1;ctx.strokeRect(bx,by,barW,barH);
      ctx.font="bold 10px Orbitron,sans-serif";ctx.textAlign="center";ctx.fillStyle="#fff";ctx.fillText("POWER",W/2,by-4);
      s.power+=.025*s.powerDir;
      if(s.power>=1){s.powerDir=-1;}
      if(s.power<=0){s.powerDir=1;}
    }

    // === BALL ===
    if(!ball.flying){
      // Ball on ground - draw idle
      const bx=ball.x,by=ball.y;
      ctx.beginPath();ctx.arc(bx,by+8,10,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,.2)";ctx.fill();
      // Ball
      const bg=ctx.createRadialGradient(bx-4,by-4,2,bx,by,13);
      bg.addColorStop(0,"#ffffff");bg.addColorStop(.4,"#dddddd");bg.addColorStop(1,"#888888");
      ctx.beginPath();ctx.arc(bx,by,13,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
      // Soccer pattern
      ctx.fillStyle="rgba(0,0,0,.7)";
      [[0,-8],[7,5],[-7,5]].forEach(([ox,oy])=>{ctx.beginPath();ctx.arc(bx+ox,by+oy,4,0,Math.PI*2);ctx.fill();});
    }else{
      // Flying ball
      ball.x+=ball.vx;ball.y+=ball.vy;ball.vy+=.4;ball.spin+=.15;
      const bx=ball.x,by=ball.y;
      // Shadow
      const shadowY=H*.34;const shadowA=Math.max(0,.5-(by-shadowY)/300);
      ctx.beginPath();ctx.ellipse(bx,shadowY,14*shadowA,4*shadowA,0,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,0,0,${shadowA*.5})`;ctx.fill();
      // Ball with spin
      ctx.save();ctx.translate(bx,by);ctx.rotate(ball.spin);
      const bg2=ctx.createRadialGradient(-4,-4,2,0,0,13);
      bg2.addColorStop(0,"#ffffff");bg2.addColorStop(.4,"#dddddd");bg2.addColorStop(1,"#888888");
      ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.fillStyle=bg2;ctx.fill();
      ctx.fillStyle="rgba(0,0,0,.7)";
      [[0,-8],[7,5],[-7,5]].forEach(([ox,oy])=>{ctx.beginPath();ctx.arc(ox,oy,4,0,Math.PI*2);ctx.fill();});
      ctx.restore();

      // GOAL / SAVE check
      if(!ball.done&&by<=H*.35+5){
        ball.done=true;
        const inGoal=bx>GX+5&&bx<GX+GW-5;
        if(inGoal){
          // Check if GK catches
          const gkCatch=Math.abs(gk.x-bx)<35&&!gk.diving;
          if(!gkCatch){
            // GOAL!
            sndGoal();s.score++;setS(s.score);s.streak++;setStrk(s.streak);
            s.result="⚽ GOAAAL!";s.resultTick=90;s.netShake=8;
            spawnParts(bx,H*.35,"#6bcb77",25);spawnParts(bx,H*.35,"#ffd93d",15);spawnParts(bx,H*.35,"#ffffff",10);
          }else{
            // SAVED!
            sndSave();s.streak=0;setStrk(0);
            s.result="🧤 SAVED!";s.resultTick=70;
            gk.diving=bx<gk.x?"left":"right";gk.diveT=0;
            spawnParts(gk.x,H*.37-20,"#ff8c00",10);
          }
        }else{
          s.result="↗ Wide!";s.resultTick=50;
        }
        setTimeout(()=>{
          if(phR.current!=="running")return;
          ball.x=W/2;ball.y=H-70;ball.vx=0;ball.vy=0;ball.flying=false;ball.done=false;
          s.phase="aim";s.aimX=W/2;s.power=0;
        },1200);
      }
      // Ball left screen
      if(ball.y>H+50||ball.x<-30||ball.x>W+30){
        ball.flying=false;ball.done=true;ball.x=W/2;ball.y=H-70;
        s.phase="aim";s.aimX=W/2;s.power=0;
      }
    }

    // PARTICLES
    s.particles=s.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.3;p.life--;
      ctx.save();ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
      ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      ctx.restore();return p.life>0;});

    // RESULT TEXT
    if(s.result&&s.resultTick>0){
      s.resultTick--;
      ctx.save();ctx.globalAlpha=Math.min(1,s.resultTick/20);
      const big=s.result.includes("GOAAAL");
      ctx.font=`bold ${big?34:24}px Orbitron,sans-serif`;ctx.textAlign="center";
      ctx.fillStyle=s.result.includes("GOAAAL")?"#ffd93d":s.result.includes("SAVED")?"#ff4444":"#aaa";
      ctx.shadowBlur=30;ctx.shadowColor=ctx.fillStyle;
      ctx.fillText(s.result,W/2,H*.56);
      if(big&&s.resultTick>60){
        // Goal celebration stars
        for(let i=0;i<6;i++){
          const a=i/6*Math.PI*2+Date.now()*.003,r=60+10*Math.sin(Date.now()*.01+i);
          ctx.font="18px serif";ctx.textAlign="center";ctx.fillText("⭐",W/2+Math.cos(a)*r,H*.56+Math.sin(a)*r*.5);
        }
      }
      ctx.restore();
    }

    // HUD
    ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(0,0,W,32);
    ctx.font="bold 13px Orbitron,sans-serif";ctx.textAlign="left";
    ctx.fillStyle="#6bcb77";ctx.fillText("⚽ "+s.score,8,21);
    ctx.textAlign="center";
    ctx.fillStyle=time<=10?"#ff4444":"#ffd93d";ctx.fillText(time+"s",W/2,21);
    ctx.textAlign="right";
    ctx.fillStyle="#f97316";ctx.fillText(s.streak>=2?"🔥×"+s.streak:"",W-8,21);

    // Phase instruction
    if(s.phase==="aim"){
      ctx.font="bold 10px Orbitron,sans-serif";ctx.textAlign="center";ctx.fillStyle="rgba(255,255,255,.5)";
      ctx.fillText("← SLIDE TO AIM →",W/2,H-8);
    }
  };

  const loop=()=>{if(phR.current!=="running")return;draw();rafR.current=requestAnimationFrame(loop);};

  const handleTouch=(e)=>{
    e.preventDefault();
    const s=st.current;
    const rect=cR.current.getBoundingClientRect();
    const tx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const ty=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    // Scale to canvas coords
    const scaleX=W/rect.width;
    const cx=tx*scaleX;

    if(s.phase==="aim"){
      s.swipeStart={x:cx,y:ty};
      s.phase="power";sndPowerup();
    }else if(s.phase==="power"){
      // Shoot!
      const b=s.ball;
      sndKick();
      const dx=(s.aimX-b.x)/W;
      const pwr=s.power;
      b.vx=dx*15*pwr+dx*6;
      b.vy=-(12+pwr*10);
      b.flying=true;b.done=false;
      s.phase="shooting";
    }
  };

  const handleMove=(e)=>{
    e.preventDefault();
    const s=st.current;
    if(s.phase!=="power"&&s.phase!=="aim")return;
    const rect=cR.current.getBoundingClientRect();
    const tx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const scaleX=W/rect.width;
    const cx=Math.max(80,Math.min(W-80,tx*scaleX));
    s.aimX=cx;
  };

  useEffect(()=>{if(ph!=="running")return;if(time<=0){phR.current="done";onEnd(st.current.score*10,game.id);return;}const t=setTimeout(()=>setTm(x=>x-1),1000);return()=>clearTimeout(t);},[ph,time]);
  useEffect(()=>()=>{if(rafR.current)cancelAnimationFrame(rafR.current);},[]);

  const start=()=>{
    const s=st.current;
    Object.assign(s,{score:0,streak:0,ball:{x:W/2,y:H-70,vx:0,vy:0,spin:0,flying:false,done:false},gk:{x:W/2,vx:2.5,dir:1,diving:false,diveX:0,diveT:0},phase:"aim",power:0,aimX:W/2,result:null,resultTick:0,particles:[],netShake:0,crowd:0});
    setS(0);setStrk(0);setTm(45);
    phR.current="running";setPh("running");
    rafR.current=requestAnimationFrame(loop);
  };

  return(<div style={{textAlign:"center",padding:".5rem",width:"100%",maxWidth:380,margin:"0 auto"}}>
    <TopBar name={name} onBack={onBack} game={game}/>
    {ph!=="idle"&&<canvas ref={cR} width={W} height={H}
      onMouseDown={handleTouch} onMouseMove={e=>{if(e.buttons)handleMove(e);}}
      onTouchStart={handleTouch} onTouchMove={handleMove}
      style={{display:"block",margin:"0 auto .3rem",maxWidth:"100%",borderRadius:16,
        border:"2px solid #3b82f644",cursor:"pointer",touchAction:"none",
        boxShadow:"0 8px 32px rgba(0,0,0,.7)"}}/>}
    {ph==="idle"&&<div style={{padding:"1rem 0"}}>
      <div style={{fontSize:"3rem",marginBottom:".5rem"}}>⚽</div>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:".8rem"}}>
        {[["👆","Tap = Power charge"],["👈","Slide = Aim"],["⚽","Release = SHOOT!"]].map(([e,l])=>(
          <div key={e} style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:".4rem .6rem",textAlign:"center",border:"1px solid rgba(255,255,255,.06)"}}>
            <div style={{fontSize:"1.2rem"}}>{e}</div><div style={{color:"#555",fontSize:".6rem",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <p style={{color:"#666",fontSize:".8rem",marginBottom:".8rem",lineHeight:1.6}}>Slide to aim, tap again to shoot!<br/>Goalkeeper se bachao - 45 seconds!</p>
      <button onClick={start} style={GB(game.c[0],game.c[1],{maxWidth:230,margin:"0 auto"})}>⚽ Kick Off!</button>
    </div>}
    {ph==="done"&&<div style={{marginTop:".8rem",animation:"bounceIn .4s"}}>
      <div style={{fontFamily:"'Orbitron',sans-serif",color:game.c[0],fontSize:"1.3rem",fontWeight:900}}>⚽ {score} GOALS!</div>
      <button onClick={start} style={GB(game.c[0],game.c[1],{maxWidth:210,margin:".6rem auto 0"})}>🔄 Phir Khelo!</button>
    </div>}
  </div>);
}

function TowerStack({game,name,onEnd,onBack}){
  const W=280,H=400,BH=22,BASE_W=160;
  const cvRef=useRef(null);
  const rafRef=useRef(null);
  const live=useRef(false);
  const gs=useRef(null);
  const [ph,setPh]=useState('idle');
  const [sc,setSc]=useState(0);
  const [combo,setCombo]=useState(0);

  function newState(){
    return{sc:0,combo:0,level:1,ph:'run',
      stack:[{x:(W-BASE_W)/2,w:BASE_W,y:H-BH}],
      mx:0,mw:BASE_W-10,mdir:1,mspd:2.5,
      camY:0,msg:'',mt:0,fr:0};
  }

  function doTap(){
    const g=gs.current;
    if(!g||g.ph!=='run') return;
    const top=g.stack[g.stack.length-1];
    const L=Math.max(g.mx,top.x),R=Math.min(g.mx+g.mw,top.x+top.w),ov=R-L;
    if(ov<=4){
      g.ph='over';live.current=false;
      window.SFX&&window.SFX.lose&&window.SFX.lose();
      setPh('over');setSc(g.sc);
      setTimeout(()=>onEnd(g.sc,game.id),900);
      return;
    }
    const perfect=ov>=g.mw*0.88;
    const nw=perfect?top.w:ov,nx=perfect?top.x+(top.w-nw)/2:L,ny=top.y-BH;
    g.stack.push({x:nx,w:nw,y:ny});
    if(ny<100) g.camY+=BH;
    if(perfect){g.combo++;g.sc+=10+g.combo*5;g.msg='✨ PERFECT!';g.mt=50;window.SFX&&window.SFX.achieve&&window.SFX.achieve();}
    else{g.combo=0;g.sc+=Math.round(ov/top.w*8)+2;g.msg='👍 Good!';g.mt=30;window.SFX&&window.SFX.tap&&window.SFX.tap();}
    g.level++;g.mspd=Math.min(2.5+g.level*0.22,9);
    g.mx=0;g.mw=Math.max(nw*0.9,28);g.mdir=1;
    setSc(g.sc);setCombo(g.combo);
    if(g.level>20){g.ph='win';live.current=false;setPh('win');setTimeout(()=>onEnd(g.sc,game.id),800);}
  }

  function loop(){
    if(!live.current) return;
    const g=gs.current;if(!g) return;
    const cv=cvRef.current;if(!cv){rafRef.current=requestAnimationFrame(loop);return;}
    const ctx=cv.getContext('2d');
    g.fr++;
    if(g.ph==='run'){
      g.mx+=g.mdir*g.mspd;
      if(g.mx+g.mw>=W){g.mx=W-g.mw;g.mdir=-1;}
      if(g.mx<=0){g.mx=0;g.mdir=1;}
    }
    if(g.mt>0)g.mt--;else g.msg='';
    drawTS(ctx,g,W,H,BH);
    rafRef.current=requestAnimationFrame(loop);
  }

  function launch(){
    gs.current=newState();
    live.current=true;
    setPh('run');setSc(0);setCombo(0);
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(loop);
  }

  // Attach touch/click via DOM ref to guarantee it fires on mobile
  useEffect(()=>{
    const cv=cvRef.current;
    if(!cv) return;
    const handler=e=>{e.preventDefault();doTap();};
    cv.addEventListener('touchstart',handler,{passive:false});
    cv.addEventListener('mousedown',handler);
    return()=>{cv.removeEventListener('touchstart',handler);cv.removeEventListener('mousedown',handler);};
  },[ph]);

  useEffect(()=>()=>{live.current=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);},[]);

  return(
    <div style={{textAlign:'center',padding:'.5rem',width:'100%',maxWidth:320,margin:'0 auto'}}>
      <TopBar name={name} onBack={()=>{live.current=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);onBack();}} game={game}/>
      {ph==='run'&&<>
        <div style={{display:'flex',justifyContent:'space-between',maxWidth:W,margin:'0 auto .2rem',padding:'0 .3rem',fontFamily:'monospace',fontSize:'.8rem',fontWeight:700}}>
          <span style={{color:'#fbbf24'}}>⭐ {sc}</span>
          {combo>1&&<span style={{color:'#f97316'}}>🔥 x{combo}</span>}
        </div>
        <canvas ref={cvRef} width={W} height={H}
          style={{display:'block',margin:'0 auto',borderRadius:12,border:'2px solid rgba(255,255,255,.1)',cursor:'pointer',touchAction:'none',WebkitUserSelect:'none',userSelect:'none'}}/>
        <p style={{color:'#555',fontSize:'.7rem',marginTop:4}}>Canvas pe TAP karo block stack karne ke liye!</p>
      </>}
      {ph==='idle'&&<div style={{padding:'1rem 0'}}>
        <div style={{fontSize:'3rem',marginBottom:'.5rem'}}>🏗️</div>
        <div style={{color:'#666',fontSize:'.84rem',marginBottom:'1rem',lineHeight:1.8}}>
          Moving block ko sahi time pe tap karo!<br/>
          <span style={{color:'#fbbf24',fontWeight:700}}>Perfect = Combo Bonus ✨</span>
        </div>
        <button onClick={launch} style={GB(game.c[0],game.c[1],{maxWidth:215,margin:'0 auto'})}>🏗️ Build!</button>
      </div>}
      {(ph==='over'||ph==='win')&&<div style={{padding:'1rem 0'}}>
        <div style={{fontSize:'2.5rem',margin:'.5rem 0'}}>{ph==='win'?'🏆':'💥'}</div>
        <div style={{color:'#fff',fontSize:'1rem',fontWeight:700,marginBottom:'.7rem'}}>Score: {sc}</div>
        <button onClick={launch} style={GB(game.c[0],game.c[1],{maxWidth:215,margin:'0 auto'})}>🔄 Again!</button>
      </div>}
    </div>
  );
}

function drawTS(ctx,g,W,H,BH){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  const sk=ctx.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,'#1e1b4b');sk.addColorStop(1,'#0f172a');
  ctx.fillStyle=sk;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.3)';
  for(let i=0;i<20;i++) ctx.fillRect((i*139)%W,(i*83)%100,1.5,1.5);
  const cam=g.camY;
  g.stack.forEach((b,i)=>{
    const y=b.y+cam;if(y>H+5||y<-BH) return;
    const t=i/Math.max(g.stack.length,1);
    const r=Math.round(59+t*180),gr=Math.round(130+t*80),bl=Math.round(246-t*100);
    ctx.fillStyle=`rgb(${r},${gr},${bl})`;ctx.fillRect(b.x,y,b.w,BH);
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(b.x,y,b.w,4);
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(b.x,y+BH-3,b.w,3);
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.strokeRect(b.x,y,b.w,BH);
  });
  // Crane
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,10);ctx.lineTo(W,10);ctx.stroke();
  ctx.strokeStyle='#6b7280';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,10);ctx.stroke();
  const mid=g.mx+g.mw/2;
  ctx.strokeStyle='#6b7280';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(mid,10);ctx.lineTo(mid,42);ctx.stroke();
  ctx.setLineDash([]);
  // Moving block
  if(g.ph==='run'||g.ph==='win'){
    const mg=ctx.createLinearGradient(g.mx,0,g.mx+g.mw,0);
    mg.addColorStop(0,'#f59e0b');mg.addColorStop(1,'#fbbf24');
    ctx.fillStyle=mg;ctx.fillRect(g.mx,42,g.mw,BH);
    ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(g.mx,42,g.mw,5);
    ctx.strokeStyle='#fcd34d';ctx.lineWidth=1.5;ctx.strokeRect(g.mx,42,g.mw,BH);
  }
  ctx.font='bold 13px monospace';ctx.fillStyle='#fbbf24';ctx.textAlign='left';ctx.fillText('Lv '+g.level,8,H-8);
  ctx.textAlign='right';ctx.fillStyle='#fff';ctx.fillText('⭐ '+g.sc,W-8,H-8);
  if(g.combo>1){ctx.textAlign='center';ctx.fillStyle='#f97316';ctx.fillText('🔥 x'+g.combo,W/2,H-8);}
  if(g.msg&&g.mt>0){
    const a=Math.min(1,g.mt/14);
    ctx.save();ctx.globalAlpha=a;ctx.font='bold 17px monospace';ctx.textAlign='center';
    const col=g.msg.includes('PERFECT')?'#fbbf24':'#6bcb77';
    ctx.fillStyle=col;ctx.shadowBlur=8;ctx.shadowColor=col;
    ctx.fillText(g.msg,W/2,H/2+20);ctx.restore();
  }
  if(g.ph==='over'||g.ph==='win'){
    ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.font='bold 22px monospace';
    ctx.fillStyle=g.ph==='win'?'#fbbf24':'#ef4444';
    ctx.fillText(g.ph==='win'?'🏆 BUILT!':'💥 MISSED!',W/2,H/2-15);
    ctx.font='14px monospace';ctx.fillStyle='#fff';ctx.fillText('Score: '+g.sc,W/2,H/2+12);
  }
}

function CarDodge({game,name,onEnd,onBack}){
  const W=300,H=420;
  const LANES=[52,110,168,226];
  const CW=38,CH=58,PW=36,PH=54;
  const cvRef=useRef(null);
  const rafRef=useRef(null);
  const btnLRef=useRef(null);
  const btnRRef=useRef(null);
  const live=useRef(false);
  const gs=useRef(null);
  const [ph,setPh]=useState('idle');
  const [sc,setSc]=useState(0);
  const [coins,setCoins]=useState(0);
  const [time,setTime]=useState(60);

  function newState(){
    return{ph:'run',sc:0,coins:0,lane:1,px:LANES[1],
      cars:[],coinArr:[],spd:3.2,spawnT:0,spawnInt:58,
      coinT:0,time:60,timeFr:0,fr:0,roadY:0,msg:'',mt:0};
  }

  function goLeft(){
    const g=gs.current;if(!g||g.ph!=='run') return;
    if(g.lane>0){g.lane--;window.SFX&&window.SFX.click&&window.SFX.click();}
  }
  function goRight(){
    const g=gs.current;if(!g||g.ph!=='run') return;
    if(g.lane<3){g.lane++;window.SFX&&window.SFX.click&&window.SFX.click();}
  }

  function loop(){
    if(!live.current) return;
    const g=gs.current;if(!g) return;
    const cv=cvRef.current;if(!cv){rafRef.current=requestAnimationFrame(loop);return;}
    const ctx=cv.getContext('2d');
    g.fr++;
    if(g.ph!=='run'){drawCD(ctx,g,W,H,LANES,CW,CH,PW,PH);return;}

    // Timer
    g.timeFr++;
    if(g.timeFr>=60){g.timeFr=0;g.time--;setTime(g.time);
      if(g.time<=0){
        g.ph='done';live.current=false;
        drawCD(ctx,g,W,H,LANES,CW,CH,PW,PH);
        setPh('done');setSc(g.sc);setCoins(g.coins);
        setTimeout(()=>onEnd(g.sc,game.id),1100);return;
      }
    }

    // Smooth player x
    const tx=LANES[g.lane];
    g.px+=(tx-g.px)*0.22;

    g.roadY=(g.roadY+g.spd)%80;
    g.spd=3.2+((60-g.time)/60)*4.2;
    g.spawnInt=Math.max(26,58-((60-g.time)/60)*24);

    // Spawn traffic - guarantee at least 2 lanes open
    g.spawnT++;
    if(g.spawnT>=g.spawnInt){
      g.spawnT=0;
      const open=[0,1,2,3];
      // Shuffle
      for(let i=open.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[open[i],open[j]]=[open[j],open[i]];}
      const blockCount=Math.random()<0.3?2:1;
      const cols=['#ef4444','#3b82f6','#8b5cf6','#f59e0b','#ec4899','#0ea5e9'];
      for(let i=0;i<blockCount;i++){
        g.cars.push({l:open[i],y:-CH-Math.random()*30,color:cols[Math.floor(Math.random()*cols.length)]});
      }
    }

    // Spawn coins
    g.coinT++;
    if(g.coinT>=75){g.coinT=0;g.coinArr.push({l:Math.floor(Math.random()*4),y:-20});}

    g.cars.forEach(c=>c.y+=g.spd*1.08);
    g.cars=g.cars.filter(c=>c.y<H+CH);
    g.coinArr.forEach(c=>c.y+=g.spd);
    g.coinArr=g.coinArr.filter(c=>c.y<H+20);

    const py=H-PH-12;

    // Collision
    for(const c of g.cars){
      const cx=LANES[c.l];
      if(Math.abs(cx-g.px)<(CW/2+PW/2-8)&&c.y+CH>py+8&&c.y<py+PH-8){
        g.ph='crash';live.current=false;
        window.SFX&&window.SFX.lose&&window.SFX.lose();
        drawCD(ctx,g,W,H,LANES,CW,CH,PW,PH);
        setPh('crash');setSc(g.sc);setCoins(g.coins);
        setTimeout(()=>onEnd(g.sc,game.id),1100);return;
      }
    }

    // Coins
    g.coinArr=g.coinArr.filter(c=>{
      if(Math.abs(LANES[c.l]-g.px)<28&&c.y+10>py&&c.y<py+PH){
        g.coins++;g.sc+=15;g.msg='💰 +15!';g.mt=22;
        window.SFX&&window.SFX.coin&&window.SFX.coin();
        setCoins(g.coins);return false;
      }
      return true;
    });

    if(g.fr%20===0){g.sc++;setSc(g.sc);}
    if(g.mt>0)g.mt--;else g.msg='';

    drawCD(ctx,g,W,H,LANES,CW,CH,PW,PH);
    rafRef.current=requestAnimationFrame(loop);
  }

  function launch(){
    gs.current=newState();
    live.current=true;
    setPh('run');setSc(0);setCoins(0);setTime(60);
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(loop);
  }

  // Attach DOM events directly - most reliable for mobile touch
  useEffect(()=>{
    const bl=btnLRef.current,br=btnRRef.current;
    if(!bl||!br) return;
    const lh=e=>{e.preventDefault();e.stopPropagation();goLeft();};
    const rh=e=>{e.preventDefault();e.stopPropagation();goRight();};
    bl.addEventListener('touchstart',lh,{passive:false});
    bl.addEventListener('mousedown',lh);
    br.addEventListener('touchstart',rh,{passive:false});
    br.addEventListener('mousedown',rh);
    return()=>{
      bl.removeEventListener('touchstart',lh);bl.removeEventListener('mousedown',lh);
      br.removeEventListener('touchstart',rh);br.removeEventListener('mousedown',rh);
    };
  },[ph]);

  useEffect(()=>()=>{live.current=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);},[]);

  const btnStyle={
    flex:1,height:64,
    background:'rgba(34,197,94,.1)',
    border:'2.5px solid rgba(34,197,94,.4)',
    borderRadius:14,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'2.2rem',
    cursor:'pointer',
    touchAction:'none',
    userSelect:'none',
    WebkitUserSelect:'none',
    WebkitTapHighlightColor:'transparent',
  };

  return(
    <div style={{textAlign:'center',padding:'.5rem',width:'100%',maxWidth:340,margin:'0 auto'}}>
      <TopBar name={name} onBack={()=>{live.current=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);onBack();}} game={game}/>
      {ph==='run'&&<>
        <div style={{display:'flex',justifyContent:'space-between',maxWidth:W,margin:'0 auto .2rem',padding:'0 .3rem',fontFamily:'monospace',fontSize:'.78rem',fontWeight:700}}>
          <span style={{color:'#fbbf24'}}>⭐ {sc}</span>
          <span style={{color:time<=8?'#ef4444':'#fff'}}>⏱ {time}s</span>
          <span style={{color:'#f59e0b'}}>💰 {coins}</span>
        </div>
        <canvas ref={cvRef} width={W} height={H}
          style={{display:'block',margin:'0 auto',borderRadius:12,border:'2px solid rgba(255,255,255,.08)',touchAction:'none'}}/>
        <div style={{display:'flex',gap:12,marginTop:10,padding:'0 4px'}}>
          <div ref={btnLRef} style={btnStyle}>⬅️</div>
          <div ref={btnRRef} style={btnStyle}>➡️</div>
        </div>
      </>}
      {ph==='idle'&&<div style={{padding:'1rem 0'}}>
        <div style={{fontSize:'3rem',marginBottom:'.5rem'}}>🚗</div>
        <div style={{color:'#666',fontSize:'.84rem',marginBottom:'1rem',lineHeight:1.8}}>
          Traffic se bacho - coins uthao!<br/>
          <span style={{color:'#fbbf24',fontWeight:700}}>Left/Right se lane badlo 🏁</span>
        </div>
        <button onClick={launch} style={GB(game.c[0],game.c[1],{maxWidth:215,margin:'0 auto'})}>🚗 Drive!</button>
      </div>}
      {(ph==='crash'||ph==='done')&&<div style={{padding:'1rem 0'}}>
        <div style={{fontSize:'2.5rem',margin:'.5rem 0'}}>{ph==='crash'?'💥':'🏁'}</div>
        <div style={{color:'#fff',fontSize:'1rem',fontWeight:700}}>Score: {sc}</div>
        <div style={{color:'#f59e0b',fontSize:'.85rem',margin:'.3rem 0 .8rem'}}>Coins: {coins}</div>
        <button onClick={launch} style={GB(game.c[0],game.c[1],{maxWidth:215,margin:'0 auto'})}>🔄 Again!</button>
      </div>}
    </div>
  );
}

function drawCD(ctx,g,W,H,LANES,CW,CH,PW,PH){
  ctx.fillStyle='#374151';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#166534';ctx.fillRect(0,0,30,H);ctx.fillRect(W-30,0,30,H);
  ctx.fillStyle='#15803d';
  for(let y=0;y<H+50;y+=50){
    const yy=(y+g.roadY)%H;
    ctx.fillRect(3,yy,24,22);ctx.fillRect(W-27,yy,24,22);
  }
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2.5;ctx.setLineDash([24,18]);
  [81,137,193].forEach(x=>{ctx.beginPath();ctx.moveTo(x,-10);ctx.lineTo(x,H+10);ctx.stroke();});
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(30,0);ctx.lineTo(30,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-30,0);ctx.lineTo(W-30,H);ctx.stroke();

  // Coins
  g.coinArr.forEach(c=>{
    const cx=LANES[c.l],cy=c.y+10;
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#fbbf24';
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(cx-2,cy-2,2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Traffic cars
  g.cars.forEach(c=>_drawCar(ctx,LANES[c.l]-CW/2,c.y,CW,CH,c.color,false));

  // Player car
  _drawCar(ctx,g.px-PW/2,H-PH-12,PW,PH,'#22c55e',true);

  // HUD
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,30);
  ctx.font='bold 12px monospace';
  ctx.textAlign='left';ctx.fillStyle='#fbbf24';ctx.fillText('⭐ '+g.sc,8,20);
  ctx.textAlign='center';ctx.fillStyle='#fff';ctx.fillText('⏱ '+g.time+'s',W/2,20);
  ctx.textAlign='right';ctx.fillStyle='#f59e0b';ctx.fillText('💰 '+g.coins,W-8,20);

  if(g.msg&&g.mt>0){
    const a=Math.min(1,g.mt/12);
    ctx.save();ctx.globalAlpha=a;ctx.font='bold 16px monospace';ctx.textAlign='center';
    ctx.fillStyle='#fbbf24';ctx.shadowBlur=6;ctx.shadowColor='#fbbf24';
    ctx.fillText(g.msg,W/2,H-115);ctx.restore();
  }
  if(g.ph==='crash'||g.ph==='done'){
    ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.font='bold 22px monospace';
    ctx.fillStyle=g.ph==='crash'?'#ef4444':'#fbbf24';
    ctx.fillText(g.ph==='crash'?'💥 CRASH!':'🏁 FINISH!',W/2,H/2-18);
    ctx.font='14px monospace';ctx.fillStyle='#fff';ctx.fillText('Score: '+g.sc,W/2,H/2+8);
    ctx.font='12px monospace';ctx.fillStyle='#f59e0b';ctx.fillText('Coins: '+g.coins,W/2,H/2+28);
  }
}

function _drawCar(ctx,x,y,w,h,color,isPlayer){
  ctx.save();
  function dk(hex,a){const n=parseInt(hex.replace('#',''),16);const r=Math.max(0,(n>>16)-a),g=Math.max(0,((n>>8)&0xff)-a),b=Math.max(0,(n&0xff)-a);return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
  ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x,y+h*0.12,w,h*0.76,4);ctx.fill();
  ctx.fillStyle=dk(color,35);ctx.beginPath();ctx.roundRect(x+w*0.1,y+h*0.04,w*0.8,h*0.48,4);ctx.fill();
  ctx.fillStyle='rgba(180,230,255,.7)';ctx.beginPath();ctx.roundRect(x+w*0.13,y+h*0.06,w*0.74,h*0.22,3);ctx.fill();
  ctx.fillStyle='rgba(150,200,255,.5)';ctx.beginPath();ctx.roundRect(x+w*0.13,y+h*0.3,w*0.74,h*0.18,2);ctx.fill();
  ctx.fillStyle='#111';
  [[x-3,y+h*0.14],[x+w-5,y+h*0.14],[x-3,y+h*0.64],[x+w-5,y+h*0.64]].forEach(([wx,wy])=>{ctx.beginPath();ctx.roundRect(wx,wy,8,14,3);ctx.fill();});
  if(isPlayer){ctx.fillStyle='#fbbf24';ctx.shadowBlur=7;ctx.shadowColor='#fbbf24';ctx.fillRect(x+3,y+h*0.84,9,5);ctx.fillRect(x+w-12,y+h*0.84,9,5);}
  else{ctx.fillStyle='#ef4444';ctx.shadowBlur=4;ctx.shadowColor='#ef4444';ctx.fillRect(x+3,y+3,9,5);ctx.fillRect(x+w-12,y+3,9,5);}
  ctx.shadowBlur=0;
  if(isPlayer){ctx.strokeStyle='rgba(34,197,94,.45)';ctx.lineWidth=2;ctx.shadowBlur=8;ctx.shadowColor='#22c55e';ctx.beginPath();ctx.roundRect(x-1,y+h*0.11,w+2,h*0.78,5);ctx.stroke();ctx.shadowBlur=0;}
  ctx.restore();
}


// ============================================================
// FRUIT SLICE GAME - Swipe to cut fruits, avoid bombs
// ============================================================
function FruitSlice({game,name,onEnd,onBack}){
  // Canvas is 320x460 internally - always use these for coords
  const W=320, H=460, TOTAL=60;
  const cvRef   = useRef(null);
  const rafRef  = useRef(null);
  const live    = useRef(false);
  const gs      = useRef(null);
  const trail   = useRef([]);   // slash trail {x,y} in canvas coords

  const [ph,setPh]       = useState('idle');
  const [sc,setSc]       = useState(0);
  const [livesUI,setLivesUI] = useState(3);
  const [tmUI,setTmUI]   = useState(TOTAL);

  const FRUITS = [
    {color:'#16a34a', inner:'#ef4444', r:28, pts:3},  // watermelon
    {color:'#ea580c', inner:'#fbbf24', r:24, pts:2},  // orange
    {color:'#dc2626', inner:'#fca5a5', r:22, pts:2},  // apple
    {color:'#ca8a04', inner:'#fef08a', r:19, pts:1},  // lemon
    {color:'#7c3aed', inner:'#ddd6fe', r:17, pts:1},  // grape
  ];

  function newG(){
    return{
      ph:'run', sc:0, lives:3, combo:0, maxCombo:0,
      tm:TOTAL, tfr:0, fr:0,
      fruits:[], bombs:[], splashes:[],
      spawnT:0,
      msg:'', mt:0,
    };
  }

  function launch(){
    gs.current = newG();
    trail.current = [];
    live.current  = true;
    setPh('run'); setSc(0); setLivesUI(3); setTmUI(TOTAL);
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(loop);
  }

  function spawnFruit(g){
    const f = FRUITS[Math.floor(Math.random()*FRUITS.length)];
    const x  = f.r+20 + Math.random()*(W - f.r*2 - 40);
    const boost = Math.min(g.sc*0.035, 2.5);
    const vy = -(7.5 + Math.random()*2 + boost);
    const vx = (Math.random()-.5)*2;
    g.fruits.push({...f, x, y:H+f.r, vx, vy, sliced:false, age:0, splashAge:0});
  }

  function spawnBomb(g){
    const x  = 40 + Math.random()*(W-80);
    const boost = Math.min(g.sc*0.03, 2);
    const vy = -(6.5 + Math.random()*2 + boost);
    g.bombs.push({x, y:H+20, vx:(Math.random()-.5)*1.5, vy, r:22, age:0});
  }

  // ── core cut check: simple Euclidean distance ──────────────
  function cutAt(px, py){
    const g = gs.current;
    if(!g || g.ph==='over' || g.ph==='done') return;

    g.fruits.forEach(f=>{
      if(f.sliced) return;
      // hit radius = fruit radius + 22px buffer
      if(Math.hypot(f.x-px, f.y-py) < f.r+22){
        f.sliced = true; f.splashAge = 0;
        g.combo++; if(g.combo>g.maxCombo) g.maxCombo=g.combo;
        const pts = f.pts * (g.combo>=3?2:1);
        g.sc += pts; setSc(g.sc);
        g.splashes.push({x:f.x, y:f.y, color:f.inner, age:0});
        g.msg = g.combo>=3 ? '🔥 COMBO x'+g.combo+'!' : '+'+pts;
        g.mt  = g.combo>=3 ? 50 : 22;
        window.SFX&&window.SFX.volley&&window.SFX.volley();
      }
    });

    for(let i=g.bombs.length-1;i>=0;i--){
      const b = g.bombs[i];
      if(Math.hypot(b.x-px, b.y-py) < b.r+16){
        g.bombs.splice(i,1);
        g.lives--; setLivesUI(g.lives);
        g.combo=0; g.msg='💥 BOMB!'; g.mt=55;
        window.SFX&&window.SFX.wrong&&window.SFX.wrong();
        if(g.lives<=0){
          g.ph='over'; live.current=false;
          setPh('over'); setSc(g.sc);
          setTimeout(()=>onEnd(g.sc,game.id),1200);
        }
      }
    }
  }

  // ── game loop ───────────────────────────────────────────────
  function loop(){
    if(!live.current) return;
    const g = gs.current; if(!g) return;
    const cv = cvRef.current; if(!cv){ rafRef.current=requestAnimationFrame(loop); return; }
    const ctx = cv.getContext('2d');
    g.fr++;

    // timer
    g.tfr++;
    if(g.tfr>=60){
      g.tfr=0; g.tm--; setTmUI(g.tm);
      if(g.tm<=0){
        g.ph='done'; live.current=false;
        render(ctx,g);
        setPh('done'); setSc(g.sc);
        setTimeout(()=>onEnd(g.sc,game.id),1200); return;
      }
    }
    if(g.mt>0) g.mt--; else g.msg='';

    // spawn - starts slow, gets faster
    g.spawnT++;
    const rate = Math.max(45, 95 - g.sc*0.5);
    if(g.spawnT >= rate){
      g.spawnT = 0;
      spawnFruit(g);
      if(g.sc>12 && Math.random()<0.4) spawnFruit(g);
      if(Math.random() < 0.08 + g.sc*0.002) spawnBomb(g);
    }

    const GR = 0.22;

    // move fruits
    g.fruits.forEach(f=>{
      if(!f.sliced){ f.vy+=GR; f.x+=f.vx; f.y+=f.vy; }
      f.age++;
      if(f.sliced) f.splashAge++;
    });

    // missed fruit = just disappear, no life loss
    g.fruits = g.fruits.filter(f=>{
      if(f.sliced) return f.splashAge < 20;
      return f.y <= H+f.r+5;
    });

    // move bombs
    g.bombs.forEach(b=>{ b.vy+=GR*0.85; b.x+=b.vx; b.y+=b.vy; b.age++; });
    g.bombs = g.bombs.filter(b=>b.y<H+40);

    // ── every frame: check ALL trail points against ALL fruits ──
    // This catches fast-moving fruits that moved into trail path
    const tr = trail.current;
    if(tr.length > 0){
      g.fruits.forEach(f=>{
        if(f.sliced) return;
        // Check against every recent trail point
        for(let i=0;i<tr.length;i++){
          if(Math.hypot(f.x-tr[i].x, f.y-tr[i].y) < f.r+22){
            f.sliced=true; f.splashAge=0;
            g.combo++; if(g.combo>g.maxCombo) g.maxCombo=g.combo;
            const pts=f.pts*(g.combo>=3?2:1);
            g.sc+=pts; setSc(g.sc);
            g.splashes.push({x:f.x,y:f.y,color:f.inner,age:0});
            g.msg=g.combo>=3?'🔥 COMBO x'+g.combo+'!':'+'+pts;
            g.mt=g.combo>=3?50:22;
            window.SFX&&window.SFX.volley&&window.SFX.volley();
            break;
          }
        }
      });
    }

    // splashes age
    g.splashes.forEach(s=>s.age++);
    g.splashes = g.splashes.filter(s=>s.age<22);

    render(ctx,g);
    rafRef.current = requestAnimationFrame(loop);
  }

  // ── renderer ────────────────────────────────────────────────
  function render(ctx,g){
    // dark bg
    ctx.fillStyle='#1a0a00'; ctx.fillRect(0,0,W,H);
    for(let y=0;y<H;y+=20){
      ctx.strokeStyle='rgba(255,255,255,.025)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }

    // splashes
    g.splashes.forEach(s=>{
      const a = 1-s.age/22;
      ctx.save(); ctx.globalAlpha=a*0.65;
      ctx.fillStyle=s.color;
      for(let i=0;i<7;i++){
        const ang=i/7*Math.PI*2, d=8+s.age*2;
        ctx.beginPath(); ctx.arc(s.x+Math.cos(ang)*d, s.y+Math.sin(ang)*d, 5, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });

    // fruits
    g.fruits.forEach(f=>{
      if(f.sliced){
        const a = Math.max(0, 1-f.splashAge/20);
        ctx.save(); ctx.globalAlpha=a;
        [-1,1].forEach(side=>{
          ctx.save();
          ctx.translate(f.x + side*f.splashAge*1.8, f.y - f.splashAge*0.7);
          ctx.rotate(side*f.splashAge*0.1);
          ctx.beginPath();
          ctx.arc(0,0,f.r, side===1?0:Math.PI, side===1?Math.PI:Math.PI*2);
          ctx.fillStyle=f.inner; ctx.fill();
          ctx.strokeStyle=f.color; ctx.lineWidth=3; ctx.stroke();
          ctx.restore();
        });
        ctx.restore();
        return;
      }
      ctx.save();
      ctx.shadowBlur=8; ctx.shadowColor=f.color;
      ctx.fillStyle=f.color;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
      // shine
      ctx.fillStyle='rgba(255,255,255,.22)';
      ctx.beginPath(); ctx.arc(f.x-f.r*.25, f.y-f.r*.25, f.r*.38, 0, Math.PI*2); ctx.fill();
      // stem
      ctx.strokeStyle='#15803d'; ctx.lineWidth=2; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.moveTo(f.x,f.y-f.r); ctx.quadraticCurveTo(f.x+5,f.y-f.r-6,f.x+3,f.y-f.r-10); ctx.stroke();
      ctx.restore();
    });

    // bombs
    g.bombs.forEach(b=>{
      ctx.save();
      ctx.fillStyle='#111827'; ctx.shadowBlur=10; ctx.shadowColor='#ef4444';
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#374151'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='#d97706'; ctx.lineWidth=2; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.moveTo(b.x,b.y-b.r); ctx.quadraticCurveTo(b.x+7,b.y-b.r-7,b.x+5,b.y-b.r-13); ctx.stroke();
      if(b.age%8<4){ ctx.fillStyle='#fbbf24'; ctx.shadowBlur=6; ctx.shadowColor='#fbbf24'; ctx.beginPath(); ctx.arc(b.x+5,b.y-b.r-13,3,0,Math.PI*2); ctx.fill(); }
      ctx.font=b.r+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowBlur=0;
      ctx.fillText('💣',b.x,b.y);
      ctx.restore();
    });

    // slash trail
    const tr = trail.current;
    if(tr.length>1){
      ctx.save();
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.shadowBlur=18; ctx.shadowColor='rgba(255,255,255,.8)';
      ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.lineWidth=3.5;
      ctx.beginPath(); ctx.moveTo(tr[0].x,tr[0].y);
      tr.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.stroke();
      ctx.shadowBlur=0; ctx.strokeStyle='rgba(255,255,255,.95)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(tr[0].x,tr[0].y);
      tr.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.stroke();
      ctx.restore();
    }

    // HUD
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,0,W,34);
    ctx.font='bold 13px monospace';
    ctx.textAlign='left';   ctx.fillStyle='#fbbf24'; ctx.fillText('⭐ '+g.sc, 8, 22);
    ctx.textAlign='center'; ctx.fillStyle=g.tm<=10?'#ef4444':'#fff'; ctx.fillText('⏱ '+g.tm+'s', W/2, 22);
    ctx.textAlign='right';
    const h='❤️'.repeat(g.lives)+'🖤'.repeat(Math.max(0,3-g.lives));
    ctx.fillText(h, W-6, 22);

    if(g.combo>=2){
      ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillStyle='#f97316'; ctx.shadowBlur=5; ctx.shadowColor='#f97316';
      ctx.fillText('🔥 x'+g.combo, W/2, H-10); ctx.shadowBlur=0;
    }

    if(g.msg&&g.mt>0){
      const a=Math.min(1,g.mt/14);
      ctx.save(); ctx.globalAlpha=a;
      ctx.font='bold 22px monospace'; ctx.textAlign='center';
      const col=g.msg.includes('COMBO')?'#f97316':g.msg.includes('BOMB')||g.msg.includes('Miss')?'#ef4444':'#fbbf24';
      ctx.fillStyle=col; ctx.shadowBlur=10; ctx.shadowColor=col;
      ctx.fillText(g.msg,W/2,H*0.54); ctx.restore();
    }

    if(g.ph==='over'||g.ph==='done'){
      ctx.fillStyle='rgba(0,0,0,.82)'; ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      ctx.font='bold 22px monospace'; ctx.fillStyle=g.ph==='done'?'#fbbf24':'#ef4444';
      ctx.fillText(g.ph==='done'?'⏱ TIME UP!':'💥 GAME OVER', W/2, H/2-20);
      ctx.font='15px monospace'; ctx.fillStyle='#fff'; ctx.fillText('Score: '+g.sc, W/2, H/2+8);
      ctx.font='12px monospace'; ctx.fillStyle='#6bcb77'; ctx.fillText('Max Combo: x'+g.maxCombo, W/2, H/2+30);
    }
  }

  // ── touch / mouse - attach via DOM ref ──────────────────────
  useEffect(()=>{
    const cv = cvRef.current; if(!cv) return;

    function toXY(touch){
      const rect = cv.getBoundingClientRect();
      return {
        x: (touch.clientX - rect.left) * (W / rect.width),
        y: (touch.clientY - rect.top)  * (H / rect.height),
      };
    }

    function onStart(e){
      e.preventDefault();
      if(e.changedTouches){
        Array.from(e.changedTouches).forEach(t=>{
          const p=toXY(t);
          cutAt(p.x,p.y);
          trail.current.push(p);
        });
      } else {
        const p=toXY(e);
        cutAt(p.x,p.y);
        trail.current=[p];
      }
    }

    function onMove(e){
      e.preventDefault();
      if(e.changedTouches){
        // changedTouches = only fingers that actually moved this event
        Array.from(e.changedTouches).forEach(t=>{
          const p=toXY(t);
          cutAt(p.x,p.y);
          trail.current.push(p);
        });
        if(trail.current.length>80) trail.current=trail.current.slice(-50);
      } else {
        const p=toXY(e);
        cutAt(p.x,p.y);
        trail.current.push(p);
        if(trail.current.length>32) trail.current.shift();
      }
    }

    function onUp(e){
      e.preventDefault();
      setTimeout(()=>{ trail.current=[]; }, 120);
    }

    cv.addEventListener('touchstart', onStart, {passive:false});
    cv.addEventListener('touchmove',  onMove,  {passive:false});
    cv.addEventListener('touchend',   onUp,    {passive:false});
    cv.addEventListener('mousedown',  onStart);
    cv.addEventListener('mousemove',  e=>{ if(e.buttons) onMove(e); });
    cv.addEventListener('mouseup',    onUp);
    return()=>{
      cv.removeEventListener('touchstart', onStart);
      cv.removeEventListener('touchmove',  onMove);
      cv.removeEventListener('touchend',   onUp);
      cv.removeEventListener('mousedown',  onStart);
      cv.removeEventListener('mousemove',  onMove);
      cv.removeEventListener('mouseup',    onUp);
    };
  },[ph]);

  useEffect(()=>()=>{ live.current=false; if(rafRef.current) cancelAnimationFrame(rafRef.current); },[]);

  return(
    <div style={{textAlign:'center',padding:'.5rem',width:'100%',maxWidth:340,margin:'0 auto'}}>
      <TopBar name={name} onBack={()=>{live.current=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);onBack();}} game={game}/>
      {ph==='run'&&
        <canvas ref={cvRef} width={W} height={H}
          style={{display:'block',margin:'0 auto',borderRadius:12,
            border:'2px solid rgba(255,255,255,.1)',
            touchAction:'none',userSelect:'none',WebkitUserSelect:'none',
            // always fill container width so scaling stays consistent
            width:'100%', maxWidth:W}}/>
      }
      {ph==='idle'&&
        <div style={{padding:'1rem 0'}}>
          <div style={{fontSize:'3rem',marginBottom:'.5rem'}}>🍉</div>
          <div style={{color:'#666',fontSize:'.84rem',marginBottom:'1rem',lineHeight:1.85}}>
            Fruits pe <span style={{color:'#ef4444',fontWeight:700}}>swipe / touch</span> karo cut karne ke liye!<br/>
            <span style={{background:'#fbbf24',color:'#1f2937',fontWeight:700,padding:'1px 6px',borderRadius:4}}>💣 BOMB</span> se door raho!<br/>
            <span style={{color:'#f97316',fontWeight:700}}>Combo = Double Points 🔥</span>
          </div>
          <button onClick={launch} style={GB(game.c[0],game.c[1],{maxWidth:215,margin:'0 auto'})}>🍉 Slice!</button>
        </div>
      }
      {(ph==='over'||ph==='done')&&
        <div style={{padding:'1rem 0'}}>
          <div style={{fontSize:'2.5rem',margin:'.5rem 0'}}>{ph==='done'?'⏱':'💥'}</div>
          <div style={{color:'#fff',fontWeight:700,fontSize:'1rem',marginBottom:'.7rem'}}>Score: {sc}</div>
          <button onClick={launch} style={GB(game.c[0],game.c[1],{maxWidth:215,margin:'0 auto'})}>🔄 Again!</button>
        </div>
      }
    </div>
  );
}


function MazeEscape({game,name,onEnd,onBack}){
  const CELL=32,COLS=9,ROWS=11,W=COLS*CELL,H=ROWS*CELL;
  const cvRef=useRef(null);
  const rafRef=useRef(null);
  const btnRefs={u:useRef(null),d:useRef(null),l:useRef(null),r:useRef(null)};
  const live=useRef(false);
  const gs=useRef(null);
  const [ph,setPh]=useState('idle');
  const [sc,setSc]=useState(0);
  const [tm,setTm]=useState(60);
  const [lvl,setLvl]=useState(1);

  // Maze generation - recursive backtracker
  function genMaze(cols,rows){
    // walls: each cell has {n,s,e,w} = true means wall exists
    const cells=Array.from({length:rows},()=>Array.from({length:cols},()=>({n:true,s:true,e:true,w:true,visited:false,coin:false})));
    function carve(r,c){
      cells[r][c].visited=true;
      const dirs=[[0,-1,'w','e'],[-1,0,'n','s'],[0,1,'e','w'],[1,0,'s','n']].sort(()=>Math.random()-.5);
      dirs.forEach(([dr,dc,wa,wb])=>{
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!cells[nr][nc].visited){
          cells[r][c][wa]=false;cells[nr][nc][wb]=false;
          carve(nr,nc);
        }
      });
    }
    carve(0,0);
    // Add coins randomly
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
      if(!(r===0&&c===0)&&!(r===rows-1&&c===cols-1)&&Math.random()<0.12) cells[r][c].coin=true;
    return cells;
  }

  function newState(level){
    const timeLimit=Math.max(25,65-level*5);
    return{
      ph:'run',sc:0,level,
      tm:timeLimit,tfr:0,fr:0,
      cells:genMaze(COLS,ROWS),
      pr:0,pc:0,  // player row, col
      coins:0,
      msg:'',mt:0,
    };
  }

  function launch(){
    const s=newState(1);
    gs.current=s;
    live.current=true;
    setPh('run');setSc(0);setTm(s.tm);setLvl(1);
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current=requestAnimationFrame(loop);
  }

  function move(dr,dc){
    const g=gs.current;if(!g||g.ph!=='run') return;
    const{pr,pc}=g;
    const cell=g.cells[pr][pc];
    // Check wall
    if(dr===-1&&cell.n) return;
    if(dr===1&&cell.s) return;
    if(dc===-1&&cell.w) return;
    if(dc===1&&cell.e) return;
    const nr=pr+dr,nc=pc+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
    g.pr=nr;g.pc=nc;
    window.SFX&&window.SFX.click&&window.SFX.click();
    // Coin
    if(g.cells[nr][nc].coin){
      g.cells[nr][nc].coin=false;
      g.coins++;g.sc+=10;
      setSc(g.sc);
      g.msg='💰 +10!';g.mt=22;
      window.SFX&&window.SFX.coin&&window.SFX.coin();
    }
    // Check exit
    if(nr===ROWS-1&&nc===COLS-1){
      const bonus=g.tm*2+g.coins*5;
      g.sc+=bonus;setSc(g.sc);
      g.ph='next';
      window.SFX&&window.SFX.achieve&&window.SFX.achieve();
      g.msg='🎉 EXIT! +'+bonus;g.mt=80;
      setTimeout(()=>{
        if(!live.current) return;
        const ns=newState(g.level+1);
        ns.sc=g.sc;
        gs.current=ns;
        setLvl(ns.level);setTm(ns.tm);
      },900);
    }
  }

  function loop(){
    if(!live.current) return;
    const g=gs.current;if(!g) return;
    const cv=cvRef.current;if(!cv){rafRef.current=requestAnimationFrame(loop);return;}
    const ctx=cv.getContext('2d');
    g.fr++;

    if(g.ph==='run'){
      g.tfr++;
      if(g.tfr>=60){g.tfr=0;g.tm--;setTm(g.tm);
        if(g.tm<=0){
          g.ph='over';live.current=false;
          draw(ctx,g);setPh('over');setSc(g.sc);
          setTimeout(()=>onEnd(g.sc,game.id),1200);return;
        }
      }
    }
    if(g.mt>0)g.mt--;else g.msg='';

    draw(ctx,g);
    rafRef.current=requestAnimationFrame(loop);
  }

  function draw(ctx,g){
    ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);

    const C=CELL;
    // Draw cells
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const cx=c*C,cy=r*C;
        const cell=g.cells[r][c];
        // Floor
        ctx.fillStyle='#1e293b';ctx.fillRect(cx+1,cy+1,C-2,C-2);
        // Walls
        ctx.fillStyle='#7c3aed';
        const W2=3;
        if(cell.n) ctx.fillRect(cx,cy,C,W2);
        if(cell.s) ctx.fillRect(cx,cy+C-W2,C,W2);
        if(cell.w) ctx.fillRect(cx,cy,W2,C);
        if(cell.e) ctx.fillRect(cx+C-W2,cy,W2,C);
        // Coin
        if(cell.coin){
          ctx.save();ctx.shadowBlur=6;ctx.shadowColor='#fbbf24';
          ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(cx+C/2,cy+C/2,6,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(cx+C/2,cy+C/2,4,0,Math.PI*2);ctx.fill();
          ctx.restore();
        }
      }
    }

    // Exit marker
    const ex=(COLS-1)*C,ey=(ROWS-1)*C;
    ctx.save();
    ctx.shadowBlur=14;ctx.shadowColor='#06b6d4';
    ctx.fillStyle='rgba(6,182,212,.25)';ctx.fillRect(ex+2,ey+2,C-4,C-4);
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🚪',ex+C/2,ey+C/2);
    ctx.restore();

    // Player
    const px=g.pc*C+C/2,py=g.pr*C+C/2;
    ctx.save();
    ctx.shadowBlur=14;ctx.shadowColor='#4ade80';
    ctx.fillStyle='#4ade80';ctx.beginPath();ctx.arc(px,py,C/2-5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(px-3,py-3,4,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Message
    if(g.msg&&g.mt>0){
      const a=Math.min(1,g.mt/15);
      ctx.save();ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,H/2-18,W,36);
      ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      const col=g.msg.includes('EXIT')?'#4ade80':g.msg.includes('💰')?'#fbbf24':'#fff';
      ctx.fillStyle=col;ctx.shadowBlur=8;ctx.shadowColor=col;
      ctx.fillText(g.msg,W/2,H/2);ctx.restore();
    }

    // Over overlay
    if(g.ph==='over'){
      ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';ctx.font='bold 18px monospace';ctx.fillStyle='#ef4444';
      ctx.fillText('⏱ TIME UP!',W/2,H/2-15);
      ctx.font='13px monospace';ctx.fillStyle='#fff';ctx.fillText('Score: '+g.sc,W/2,H/2+10);
    }
  }

  // D-pad touch events
  useEffect(()=>{
    const map=[[btnRefs.u,'u',-1,0],[btnRefs.d,'d',1,0],[btnRefs.l,'l',0,-1],[btnRefs.r,'r',0,1]];
    const cleanup=map.map(([ref,,dr,dc])=>{
      const el=ref.current;if(!el) return()=>{};
      const h=e=>{e.preventDefault();e.stopPropagation();move(dr,dc);};
      el.addEventListener('touchstart',h,{passive:false});
      el.addEventListener('mousedown',h);
      return()=>{el.removeEventListener('touchstart',h);el.removeEventListener('mousedown',h);};
    });
    return()=>cleanup.forEach(f=>f());
  },[ph]);

  useEffect(()=>()=>{live.current=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);},[]);

  const dBtn=(ref,lbl)=>(
    React.createElement('div',{ref,style:{
      width:58,height:58,background:'rgba(139,92,246,.15)',
      border:'2px solid rgba(139,92,246,.4)',borderRadius:12,
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:'1.6rem',cursor:'pointer',
      touchAction:'none',userSelect:'none',WebkitUserSelect:'none',
      WebkitTapHighlightColor:'transparent',
    }},lbl)
  );

  return(
    <div style={{textAlign:'center',padding:'.5rem',width:'100%',maxWidth:340,margin:'0 auto'}}>
      <TopBar name={name} onBack={()=>{live.current=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);onBack();}} game={game}/>
      {ph==='run'&&<>
        <div style={{display:'flex',justifyContent:'space-between',maxWidth:W,margin:'0 auto .25rem',padding:'0 .3rem',fontFamily:'monospace',fontSize:'.78rem',fontWeight:700}}>
          <span style={{color:'#fbbf24'}}>⭐ {sc}</span>
          <span style={{color:'#8b5cf6'}}>Lv {lvl}</span>
          <span style={{color:tm<=8?'#ef4444':'#06b6d4'}}>⏱ {tm}s</span>
        </div>
        <canvas ref={cvRef} width={W} height={H}
          style={{display:'block',margin:'0 auto',borderRadius:10,border:'2px solid rgba(139,92,246,.3)',touchAction:'none'}}/>
        {/* D-pad */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,marginTop:10}}>
          <div>{dBtn(btnRefs.u,'⬆️')}</div>
          <div style={{display:'flex',gap:4}}>
            {dBtn(btnRefs.l,'⬅️')}
            <div style={{width:58,height:58,borderRadius:12,background:'rgba(255,255,255,.03)',border:'2px solid rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.6rem',color:'#444'}}>🟢</div>
            {dBtn(btnRefs.r,'➡️')}
          </div>
          <div>{dBtn(btnRefs.d,'⬇️')}</div>
        </div>
      </>}
      {ph==='idle'&&<div style={{padding:'1rem 0'}}>
        <div style={{fontSize:'3rem',marginBottom:'.5rem'}}>🌀</div>
        <div style={{color:'#666',fontSize:'.84rem',marginBottom:'1rem',lineHeight:1.85}}>
          Maze mein rasta dhundo - <span style={{color:'#06b6d4',fontWeight:700}}>🚪 exit</span> tak pahuncho!<br/>
          <span style={{color:'#fbbf24',fontWeight:700}}>💰 Coins collect karo bonus ke liye!</span><br/>
          Har level zyada mushkil hoga ⬆️
        </div>
        <button onClick={launch} style={GB(game.c[0],game.c[1],{maxWidth:215,margin:'0 auto'})}>🌀 Enter!</button>
      </div>}
      {ph==='over'&&<div style={{padding:'1rem 0'}}>
        <div style={{fontSize:'2.5rem',margin:'.5rem 0'}}>⏱</div>
        <div style={{color:'#fff',fontWeight:700,fontSize:'1rem',marginBottom:'.3rem'}}>Score: {sc}</div>
        <div style={{color:'#8b5cf6',fontSize:'.82rem',marginBottom:'.8rem'}}>Level {lvl} tak pahunche</div>
        <button onClick={launch} style={GB(game.c[0],game.c[1],{maxWidth:215,margin:'0 auto'})}>🔄 Again!</button>
      </div>}
    </div>
  );
}
